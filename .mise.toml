# this mise.toml is repository specific config, the global config is in config/mise/home-config.toml

[tasks.refresh]
description = "Refresh dotfiles and tools"
depends = [
  "refresh:update-skk",
  "refresh:runok",
  "refresh:nvim-restore",
  "refresh:mise-self-update",
  "refresh:mise-install",
  "refresh:lefthook",
  "refresh:brew-bundle",
  "refresh:brew-upgrade",
]

[tasks."refresh:pull"]
description = "Pull latest dotfiles and update submodules"
run = '''
#!/usr/bin/env bash
set -euo pipefail

cd "$(ghq list -e -p fohte/dotfiles)"

if git diff --quiet; then
  git pull
else
  git stash
  git pull
  git stash pop
fi

git submodule update --init --recursive
'''

[tasks."refresh:deploy"]
description = "Deploy dotfiles symlinks"
depends = ["refresh:pull"]
run = "dot deploy"

[tasks."refresh:update-skk"]
description = "Update SKK dictionary"
run = "update-skk-dictionary"

[tasks."refresh:runok"]
description = "Update runok CLI from source"
run = '''
#!/usr/bin/env bash
set -euo pipefail

cd "$(ghq list -e -p fohte/runok)"

before="$(git rev-parse HEAD)"
git pull --autostash
after="$(git rev-parse HEAD)"

if [ "$before" != "$after" ]; then
  cargo install --path .
fi
'''

[tasks."refresh:nvim-restore"]
description = "Restore Neovim plugins"
depends = ["refresh:deploy"]
run = "nvim --headless -c 'Lazy! restore' +q"

[tasks."refresh:mise-self-update"]
description = "Update mise itself"
run = '''
#!/usr/bin/env bash
set -euo pipefail

if command -v brew > /dev/null 2>&1 && brew list mise > /dev/null 2>&1; then
  brew upgrade mise
else
  mise self-update --yes || true
fi
'''

[tasks."refresh:mise-install"]
description = "Install mise tools"
depends = ["refresh:deploy", "refresh:mise-self-update"]
run = "mise install"

[tasks."refresh:lefthook"]
description = "Run lefthook hooks"
depends = ["refresh:deploy"]
run = "lefthook run pre-commit"

[tasks."refresh:brew-bundle"]
description = "Install Homebrew packages from Brewfile"
# Serialized with refresh:mise-self-update: both invoke `brew`, and running them
# concurrently races on Homebrew's Portable Ruby vendor-install lock.
wait_for = ["refresh:mise-self-update"]
run = "brew bundle --file config/homebrew/Brewfile"

[tasks."refresh:brew-upgrade"]
description = "Upgrade Homebrew packages"
depends = ["refresh:brew-bundle"]
run = "brew upgrade"

[tools]
"aqua:evilmartians/lefthook" = "2.1.9"

# lefthook hooks
actionlint = "1.7.12"
"github:betterleaks/betterleaks" = "1.6.1"
node = "26.3.0"
pinact = "4.1.0"
"github:fohte/basefmt" = "0.1.0"
"npm:@commitlint/cli" = "21.2.0"
"npm:prettier" = "3.9.4"
"aqua:koalaman/shellcheck" = "0.11.0"
"aqua:mvdan/sh" = "3.13.1"
"aqua:JohnnyMorganz/StyLua" = "2.5.2"

# Used by CI (lefthook in .github/workflows/test.yml → config/aquaskk/Makefile).
# Must stay repo-local: mise-action does not load the global config.
"aqua:google/go-jsonnet" = "0.22.0"
"aqua:jqlang/jq" = "1.8.1"
