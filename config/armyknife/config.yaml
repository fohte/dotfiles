# yaml-language-server: $schema=https://raw.githubusercontent.com/fohte/armyknife/refs/heads/master/docs/config-schema.json

editor:
  terminal: ghostty

cc:
  # quota has headroom; losing conversation context hurts more than it saves
  auto_compact:
    enabled: false

repos:
  fohte/dotfiles:
    # dotfiles is operated directly on the default branch.
    direct_commit: true
  fohte/t-rader:
    language: ja

wm:
  layout:
    command: claude
