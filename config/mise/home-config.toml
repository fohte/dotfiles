# this home-config.toml is global config (~/.config/mise/config.toml), the repository specify config is in <dotfiles root>/mise.toml

[tools]
# Language versions
"core:node" = "23.11.1"
"core:python" = "3.14.2"
"core:ruby" = "3.4.6"
"core:go" = "1.25.6"
"core:bun" = "1.2.22"
"vfox:mise-plugins/vfox-lua" = "5.4.8"

# packages
"pipx:neovim-remote" = "latest"
"gem:rubocop" = "1.84.0"

# CLI tools
"aqua:cli/cli" = "2.86.0"
"aqua:sharkdp/bat" = "0.25.0"
"aqua:x-motemen/ghq" = "1.7.1"
"aqua:junegunn/fzf" = "0.61.1"
"aqua:dandavison/delta" = "0.18.2"
"aqua:mikefarah/yq" = "4.52.2"
"vfox:mise-plugins/vfox-neovim" = "0.11.2"
"asdf:mise-plugins/mise-eza" = "0.23.4"
"aqua:starship/starship" = "1.23.0"
"aqua:BurntSushi/ripgrep" = "14.1.1"
"vfox:mise-plugins/vfox-1password" = "2.30.0"
"aqua:Wilfred/difftastic" = "0.63.0"
"aqua:astral-sh/uv" = "0.10.9"
"aqua:jqlang/jq" = "1.8.1"
"aqua:evilmartians/lefthook" = "2.0.12"
"aqua:mvdan/sh" = "3.12.0"
"aqua:koalaman/shellcheck" = "0.10.0"
"npm:@antfu/ni" = "28.3.0"
"aqua:charmbracelet/glow" = "2.1.1"
"aqua:hairyhenderson/gomplate" = "5.0.0"
"aqua:mozilla/sccache" = "0.13.0"
"npm:@mermaid-js/mermaid-cli" = "latest"
"cargo:ast-grep" = "0.40.5"

[settings]
# disable the idiomatic version file such as Gemfile
# this is the default behavior from the 2025.10.0 version
idiomatic_version_file_enable_tools = ['terraform']

# to use gem backend (gem backend is experimental)
experimental = true

# config files with these prefixes will be trusted by default
trusted_config_paths = [
  '~/ghq/github.com/fohte',
]

# Automatically install missing tools when running mise x, mise run, or as part of the 'not found' handler
auto_install = true
