[tracking]
enabled = true
history_days = 90

[display]
colors = true
emoji = true
max_width = 120

[filters]
ignore_dirs = [
    ".git",
    "node_modules",
    "target",
    "__pycache__",
    ".venv",
    "vendor",
]
ignore_files = [
    "*.lock",
    "*.min.js",
    "*.min.css",
]

[tee]
enabled = true
mode = "failures"
max_files = 20
max_file_size = 1048576

[telemetry]
enabled = false

[hooks]
# rg (ripgrep) gets rewritten to `rtk grep` (a GNU grep wrapper), but ripgrep
# and GNU grep are not CLI-compatible (regex dialect, default-recursive,
# .gitignore handling, --type, etc.). The rewrite changes semantics.
exclude_commands = ["rg"]
