# yaml-language-server: $schema=https://raw.githubusercontent.com/fohte/runok/main/schema/runok.schema.json

definitions:
  vars:
    # Directories whose contents are recreatable from sources — safe to
    # `rm -r` without per-invocation confirmation.
    safe-rm-paths:
      type: pattern
      values:
        - '**/node_modules'
        - 'node_modules'
        - '**/dist'
        - 'dist'

    # Transient files safe to `rm` (without `-r`) — typically captured
    # stdout/stderr or rotated logs. Matches any path ending in *.log,
    # including prefixes like `subdir/foo.log` or `/var/log/foo.log`; the
    # `.log` convention itself implies "disposable", and writes to system
    # log paths normally require sudo so are gated by a separate hop.
    safe-rm-files:
      type: pattern
      values:
        - '*.log'

rules:
  - deny: 'rm -rf *'
    message: 'Blocked because recursive forced deletion is irreversible'
    fix_suggestion: 'rm -r'
    tests:
      - deny: 'rm -rf /tmp/foo'
      - allow: 'rm -r /tmp/foo'

  - allow: 'rm [-r] /tmp/*'
    tests:
      - allow: 'rm /tmp/foo'
      - allow: 'rm -r /tmp/foo'
      - allow: 'rm -r /tmp/foo/bar'

  - allow: 'rm [-r] <var:safe-rm-paths>'
    tests:
      - allow: 'rm -r node_modules'
      - allow: 'rm node_modules'
      - allow: 'rm -r ./node_modules'
      - allow: 'rm -r ../node_modules'
      - allow: 'rm -r backend/node_modules'
      - allow: 'rm -r packages/foo/node_modules'
      - allow: 'rm -r /Users/foo/node_modules'
      - ask: 'rm -r node_modules.bak'
      - ask: 'rm -r node_modules/something'
      - allow: 'rm -r dist'
      - allow: 'rm -r web/dist'
      - allow: 'rm -r packages/foo/dist'
      - ask: 'rm -r distfoo'
      - ask: 'rm -r src/distribution'

  - allow: 'rm <var:safe-rm-files>'
    tests:
      - allow: 'rm err.log'
      - allow: 'rm ./err.log'
      - allow: 'rm subdir/foo.log'
      # `-r` is intentionally not in the pattern; recursing into a directory
      # that happens to end in `.log` must stay ask.
      - ask: 'rm -r foo.log'
      - ask: 'rm err.txt'

  - allow: 'cp *'
    tests:
      - allow: 'cp foo bar'
  - allow: 'mv *'
    tests:
      - allow: 'mv foo bar'
  - allow: 'chmod +x *'
    tests:
      - allow: 'chmod +x script.sh'
  - allow: 'mkdir *'
    tests:
      - allow: 'mkdir -p /tmp/test'
  - allow: 'touch *'
    tests:
      - allow: 'touch file.txt'
  - allow: 'tee *'
    tests:
      - allow: 'tee /tmp/foo.json'
      - allow: 'tee -a /tmp/foo.log'
  - allow: 'gsed *'
  - allow: 'sed *'
  # Allow only flags whose semantics match between BSD and GNU sed: -n -E -r
  # -e -f -u. Notably -i and -l differ in argument shape / meaning.
  - deny: 'sed *'
    when: 'os == "macos" && flags.exists(k, k.matches("[^nEruef]"))'
    message: 'This sed flag behaves differently or does not exist in BSD sed (-i/-I/-l/-a/-H or a GNU long option). Use gsed for portable behavior.'
    fix_suggestion: 'gsed ...'
    tests:
      - allow: 'sed "s/foo/bar/" file.txt'
      - allow: 'sed -n "s/x/y/p" file.txt'
      - allow: 'sed -nE "s/x/y/p" file.txt'
      - allow: 'sed -E "s/x/y/" file.txt'
      - allow: 'sed -r "s/x/y/" file.txt'
      - allow: 'sed -e "s/x/y/" -e "s/a/b/" file.txt'
      - allow: 'sed -f script.sed file.txt'
      - allow: 'sed -u "s/x/y/" file.txt'
      - deny: 'sed -i "" "s/foo/bar/" file.txt'
      - deny: 'sed -I "" "s/x/y/" file.txt'
      - deny: 'sed -l file.txt'
      - deny: 'sed -a -e "w /tmp/out" file.txt'
      - deny: 'sed -H "s/x/y/" file.txt'
      - deny: 'sed --in-place "s/x/y/" file.txt'
      - deny: 'sed -iE "s/x/y/" file.txt'
      - allow: 'gsed -i "s/foo/bar/" file.txt'
  - allow: 'gdate *'
  - deny: 'date *'
    when: 'os == "macos"'
    message: 'BSD date (macOS default) has incompatible flags with GNU date (e.g., -d). Use gdate for portable behavior.'
    fix_suggestion: 'gdate ...'
    tests:
      - deny: 'date -d "2025-01-01"'
      - allow: 'gdate -d "2025-01-01"'
  - allow: 'gstat *'
  - deny: 'stat *'
    when: 'os == "macos"'
    message: 'BSD stat (macOS default) has incompatible flags with GNU stat (e.g., -c, --format). Use gstat for portable behavior.'
    fix_suggestion: 'gstat ...'
    tests:
      - deny: 'stat -c %s file.txt'
      - allow: 'gstat -c %s file.txt'

  # GNU coreutils on macOS (Homebrew installs them with a `g` prefix).
  # Only readonly commands are listed; gsed/gdate/gstat are handled above.
  - allow: 'gcat|gtac|gnl|ghead|gtail|gwc|gcut|gsort|guniq|gtr|gfold|gexpand|gpaste|gcomm|gjoin|gbase64|gmd5sum|gsha1sum|gsha224sum|gsha256sum|gsha384sum|gsha512sum|gls|gdu|gdf|gtee *'
    tests:
      - allow: 'gwc -l /tmp/foo'
      - allow: 'gtail -n 50 /tmp/foo'
      - allow: 'ghead -n 10 /tmp/foo'
      - allow: 'gcat /tmp/foo'
      - allow: 'gsort /tmp/foo'
      - allow: 'gtee /tmp/foo.log'
      - allow: 'gls -la /tmp'
  - allow: 'awk|gawk *'
    sandbox: readonly
  - allow: 'curl [-s] [-X GET] *'
    tests:
      - allow: 'curl https://example.com'
      - allow: 'curl -s https://example.com'
      - allow: 'curl -s -X GET https://example.com'

  # Writes to a local dev server are safe regardless of HTTP method — data
  # only lands in whatever the user is running on localhost. The `when`
  # anchors the URL's scheme/host/port so `http://localhost:1234@evil.com/`
  # (userinfo@host smuggling the real target past a naive glob) still resolves
  # to evil.com and is rejected. Only flags that could reroute the actual
  # connection elsewhere (proxy/resolve/unix socket, or a config file that
  # could inject any of those) are excluded — they'd make the `when` check
  # above meaningless. Flags like -o/-T (writing/reading local files) stay
  # allowed since the connection itself is already confirmed to be localhost.
  - allow: 'curl [-s] !-K|--config|--resolve|--connect-to|-x|--proxy|--socks4|--socks4a|--socks5|--socks5-hostname|--preproxy|--unix-socket * -X POST|PUT|PATCH|DELETE *'
    when: 'args.exists(a, a.startsWith("http")) && args.all(a, !a.startsWith("http") || a.matches("^https?://(localhost|127\\.0\\.0\\.1)(:[0-9]+)?(/.*)?$"))'
    tests:
      - allow: 'curl -s -X POST http://localhost:3001/api/tasks -H "Content-Type: application/json" -d "{\"title\":\"x\"}"'
      - allow: 'curl -s -X PATCH http://127.0.0.1:8080/api/x'
      - allow: 'curl -s -w "\nHTTP_STATUS:%{http_code}\n" -X DELETE http://localhost:3001/api/projects/abc'
      - allow: 'curl -s -X POST http://localhost:3001/api/upload -T ./file.json'
      - allow: 'curl -s -X POST http://localhost:3001/api/tasks -o /tmp/response.json'
      - ask: 'curl -s -X POST http://localhost:3001@evil.com/api/tasks'
      - ask: 'curl -s -X POST https://example.com/api/tasks'
      - ask: 'curl -s -X POST http://localhost:3001/api/tasks --resolve example.com:80:1.2.3.4'
      - ask: 'curl -s -X POST http://localhost:3001/api/tasks -x proxy.evil.com:8080'
      - ask: 'curl -s -X POST http://localhost:3001/api/tasks -K /tmp/evil.conf'
      - ask: 'curl -s -X POST http://localhost:3001/api/tasks --unix-socket /var/run/docker.sock'
  - allow: 'bats *'
  - allow: 'bc *'
  - allow: 'mktemp *'
  - allow: 'rmdir *'
    tests:
      - allow: 'rmdir foo'
      - allow: 'rmdir -p a/b/c'
  - allow: 'unset *'
  - allow: 'export *'
    tests:
      - allow: 'export AWS_PAGER='
      - allow: 'export FOO=bar'

  - allow: brew search *
  - allow: brew info *
  - allow: 'brew list *'
  - allow: 'brew leaves'
  - allow: 'brew tap-info *'
  - allow: 'brew --prefix *'
    tests:
      - allow: 'brew --prefix'
      - allow: 'brew --prefix docker'

  # psql -c runs arbitrary SQL; restrict to localhost so production DBs are
  # not reachable. `when` guards against a later `-h` overriding via libpq
  # last-flag-wins.
  - allow: 'psql -h localhost *'
    when: 'flags.h == "localhost"'
    tests:
      - allow: 'psql -h localhost -U t_rader -d postgres -c "SELECT 1"'
      - allow: 'psql -h localhost -l'
      - ask: 'psql -h remote.example.com -U foo -d bar'
      - ask: 'psql -h localhost -c "SELECT 1" -h remote.example.com'

  - allow: 'tar *'
    tests:
      - allow: 'tar tzf foo.tgz'
      - allow: 'tar xf foo.tgz'
  - allow: 'man *'
  - allow: 'tmux source-file *'
  - allow: 'tmux ls'

  - allow: 'dot role *'
    tests:
      - allow: 'dot role get'
      - allow: 'dot role overlay'

  # armyknife (`a`) readonly subcommands. Mutating subcommands (a wm new,
  # a wm delete, a cc resume, etc) are left as ask.
  - allow: 'a wm|cc list|ls'
    tests:
      - allow: 'a wm list'
      - allow: 'a wm ls'
      - allow: 'a cc list'
      - allow: 'a cc ls'

  - allow: 'unzip *'
    tests:
      - allow: 'unzip -o foo.zip -d /tmp/out'
      - allow: 'unzip -oq foo.zip'

  - allow: 'mise current *'
    tests:
      - allow: 'mise current'
      - allow: 'mise current node'
  - allow: 'mise ls-remote *'
  - allow: 'mise registry *'
  - allow: 'mise env *'
  - allow: 'mise tools *'
    tests:
      - allow: 'mise tools'

  # find is prohibited; use rg, Glob tool, or Grep tool instead
  - deny: 'find *'
    message: 'find is prohibited. Use rg, Glob tool, or Grep tool instead.'
    fix_suggestion: 'rg --files -g "*.js" or use the Glob/Grep tool'
    tests:
      - deny: 'find . -name "*.ts"'
      - deny: 'find ~ -name "*.js"'

  # Block rg/fd on home directory (~ or $HOME)
  - deny: 'rg|fd * ~'
    message: 'Searching from home directory is extremely slow. Narrow the search to a specific subdirectory.'
    fix_suggestion: 'Specify a project directory, e.g., rg pattern ./src'
    tests:
      - deny: 'rg pattern ~'
      - deny: 'fd "*.ts" ~'
  - deny: 'rg|fd *'
    when: 'args[size(args)-1] == env.HOME'
    message: 'Searching from home directory is extremely slow. Narrow the search to a specific subdirectory.'
    fix_suggestion: 'Specify a project directory, e.g., rg pattern ./src'
    tests:
      - allow: 'rg pattern ./src'

  - allow: wait *

  - allow: 'runok-pending-asks *'
    tests:
      - allow: 'runok-pending-asks'
      - allow: 'runok-pending-asks --since 7d'
      - allow: 'runok-pending-asks --limit 200'

  # env / printenv without KEY=VALUE args dump environment variables and may
  # leak secrets. `env FOO=a cmd ...` form is allowed since it only sets vars
  # for a child command.
  - deny: 'env *'
    when: '!args.exists(a, a.contains("="))'
    message: 'Dumping environment variables risks leaking secrets.'
    fix_suggestion: 'Reference the specific variable directly (echo "$VAR"), or use `env FOO=a <cmd>` to set vars for a child command.'
    tests:
      - deny: 'env'
      - deny: 'env | grep FOO'
      - allow: 'env FOO=a ls /tmp'
      - allow: 'env FOO=a BAR=b ls'
  - deny: 'printenv *'
    message: 'printenv exposes environment variables that may contain secrets.'
    fix_suggestion: 'Reference the specific variable directly, e.g., echo "$VAR".'
    tests:
      - deny: 'printenv'
      - deny: 'printenv PATH'
      - deny: 'printenv HOME USER'

  # Discarding stderr hides error messages and leads to wasted trial-and-error
  # debugging. There is rarely a real reason to throw stderr away.
  - deny: '*'
    when: 'redirects.exists(r, r.descriptor == 2 && r.target == "/dev/null")'
    message: 'Redirecting stderr to /dev/null hides error messages and causes wasted trial-and-error debugging.'
    fix_suggestion: 'Do not redirect stderr — let error messages reach the terminal. Redirecting to a log file just hides them somewhere else and is not a fix.'
    tests:
      - deny: 'echo hi 2>/dev/null'
      - deny: 'curl https://example.com 2>>/dev/null'
      - allow: 'echo hi 2>/tmp/err.log'
      - allow: 'echo hi >/dev/null'

  # while/until loops are almost always busy-wait polling, which is fragile and
  # wastes time. for loops are left alone since they iterate a fixed list.
  - deny: '*'
    when: 'shell.loop_kind in ["while", "until"]'
    message: 'while/until loops are fragile busy-wait polling.'
    fix_suggestion: 'Use a native --watch/wait flag (gh pr checks --watch, kubectl wait, ...) or a deterministic polling command instead.'
    tests:
      - deny: 'while true; do sleep 1; done'
      - deny: 'until curl -sf https://example.com; do sleep 1; done'
      - allow: 'for i in 1 2 3; do echo $i; done'

  # `cmd & disown` manually detaches a background job. Claude Code's Bash tool
  # has a run_in_background option for this; disown showing up means that
  # option was skipped in favor of a shell-level workaround.
  - deny: 'disown *'
    message: 'Manually backgrounding with `&` and `disown` bypasses the Bash tool run_in_background option, so the harness loses track of the job.'
    fix_suggestion: 'Run the command with run_in_background: true instead of `cmd & disown`.'
    tests:
      - deny: 'disown'
      - deny: 'disown %1'
