# yaml-language-server: $schema=https://raw.githubusercontent.com/fohte/runok/main/schema/runok.schema.json

definitions:
  paths:
    # Repos pushed to directly on the default branch (no PR workflow), where
    # an accidental push has no review safety net. Add more repos here as needed.
    master-push-repos:
      - '~/ghq/github.com/fohte/dotfiles'

rules:
  # deny rules
  - deny: 'git [-C *] commit --amend *'
    message: 'Blocked to prevent rewriting previous commit which may destroy work'
    fix_suggestion: 'git commit -m "fix: ..."'
    tests:
      - deny: 'git commit --amend'
      - deny: 'git -C /tmp commit --amend --no-edit'
  - deny: 'git [-C *] commit --no-gpg-sign *'
    message: 'Blocked to ensure commits are always GPG signed'
    fix_suggestion: 'git commit -m "..."'
    tests:
      - deny: 'git commit --no-gpg-sign -m "test"'
  - deny: 'git [-C *] commit -n|--no-verify *'
    message: 'Blocked to ensure pre-commit hooks always run'
    fix_suggestion: 'git commit -m "..."'
    tests:
      - deny: 'git commit --no-verify -m "test"'
      - deny: 'git commit -n -m "test"'
  - deny: 'git [-C *] push --force-with-lease *'
    message: 'Blocked to prevent rewriting remote history'
    tests:
      - deny: 'git push --force-with-lease origin main'
  - deny: 'git [-C *] push --force *'
    message: 'Blocked to prevent rewriting remote history'
    fix_suggestion: 'git push'
    tests:
      - deny: 'git push --force origin main'
  - deny: 'git [-C *] push -f *'
    message: 'Blocked to prevent rewriting remote history'
    fix_suggestion: 'git push'
    tests:
      - deny: 'git push -f origin main'
  - deny: 'git [-C *] push * +*'
    message: 'Blocked because a refspec with a leading `+` forces non-fast-forward update and rewrites remote history'
    fix_suggestion: 'git push <remote> <src>:<dst> (without `+`). To undo commits, use `git revert`.'
    tests:
      - deny: 'git push origin +c354f52:fohte/some-branch'
      - deny: 'git push origin +main'
      - deny: 'git push origin +HEAD:refs/heads/foo'
      - deny: 'git push origin main +feature/foo'
      # -C /tmp keeps these deterministic regardless of invocation cwd -- a
      # bare `git push origin main` would ask instead of allow when this
      # rule's own tests run from inside a master-push-repos entry.
      - allow: 'git -C /tmp push origin main'
      - allow: 'git -C /tmp push'
  - deny: 'git [-C *] push --mirror *'
    message: 'Blocked because --mirror force-updates all refs on the remote'
    fix_suggestion: 'git push <remote> <branch>'
    tests:
      - deny: 'git push --mirror origin'
  # `git push`/`git fetch` are already broadly allowed and aren't
  # remote-aware, so an unreviewed `remote add` could redirect a later
  # push/fetch to an unintended destination without another confirmation
  # point catching it.
  - deny: 'git [-C *] remote add *'
    message: 'Blocked because adding a remote could redirect a later push/fetch to an unintended destination.'
    tests:
      - deny: 'git remote add origin /tmp/scratch-repo'
      - deny: 'git -C /tmp remote add origin /tmp/scratch-repo'
  - deny: 'git [-C *] update-ref *'
    message: 'Blocked because `git update-ref` rewrites refs directly and bypasses `git reset` / `git commit --amend` protections'
    fix_suggestion: 'Use porcelain commands (git commit, git revert, git branch). Refuse to do destructive ref edits without user instruction.'
    tests:
      - deny: 'git update-ref refs/heads/foo abc1234'
      - deny: 'git update-ref -d refs/heads/foo'
      - deny: 'git -C /tmp/repo update-ref refs/heads/main HEAD~3'
  - ask: 'git [-C *] push * -d|--delete *'
    message: 'This deletes a remote branch. Confirm before proceeding'
    tests:
      - ask: 'git push origin --delete feature/foo'
      - ask: 'git push -d origin feature/foo'
      - allow: 'git -C /tmp push origin main'
  - ask: 'git [-C *] push * :*'
    message: 'A refspec with empty source (`:dst`) deletes the remote ref. Confirm before proceeding'
    fix_suggestion: 'git push <remote> --delete <branch>'
    tests:
      - ask: 'git push origin :refs/heads/foo'
      - ask: 'git push origin :feature/foo'
      - allow: 'git -C /tmp push origin main:main'
      - allow: 'git -C /tmp push origin HEAD:refs/heads/foo'
  # `-C <dir>` changes the directory git actually operates on, so when it's
  # present only `flags.C` is checked -- not `env.PWD` (the shell's cwd) --
  # otherwise running `git -C /unrelated/dir push` from inside a
  # master-push-repo would wrongly ask about a push that doesn't target this
  # repo at all. `paths[]` entries are canonicalized to absolute paths at
  # load time, but `flags.C` is compared as the raw, unexpanded token, so a
  # literal `~`-prefixed `-C` argument (e.g. `-C ~/repo`) won't match -- same
  # gap every other `-C` check in this file has (they're all tested with
  # absolute paths only). The bare-cwd branch can't be covered by an inline
  # test (`InlineTestEntry` has no cwd override); verify manually with
  # `runok check --verbose` from inside the repo if this changes.
  - ask: 'git [-C *] push *'
    when: "(has(flags.C) && paths['master-push-repos'].exists(p, flags.C == p || flags.C.startsWith(p + '/'))) || (!has(flags.C) && paths['master-push-repos'].exists(p, env.PWD == p || env.PWD.startsWith(p + '/')))"
    message: 'This repo is pushed to directly on the default branch. Confirm before pushing.'
    tests:
      - ask: 'git -C /Users/fohte/ghq/github.com/fohte/dotfiles push origin main'
      - allow: 'git -C /tmp push origin main'
  # Rebasing onto any branch (not just origin/main) rewrites local commit
  # history and can only be published with a force-push, which is denied
  # outright below -- so allowing the rebase itself would be a dead end.
  # Declared before the more specific origin/main and -i denies so those
  # win the shown message for their narrower cases (last matching `deny`
  # wins the message; see `runok check` behavior).
  - deny: 'git [-C *] rebase !--continue|--abort|--skip *'
    message: 'Blocked because rebasing rewrites local history, which can only be published with a force-push (already blocked).'
    tests:
      - deny: 'git rebase some-branch'
      - deny: 'git -C /tmp rebase some-branch'
      - deny: 'git rebase --rebase-merges origin/copier-update/v0.8.13'
  - deny: 'git [-C *] rebase origin/main|origin/master *'
    message: 'Blocked to prevent unintended rewriting of commit history'
    fix_suggestion: 'git pull'
    tests:
      - deny: 'git rebase origin/main'
      - deny: 'git rebase origin/master'
  - deny: 'git [-C *] pull --no-rebase *'
    message: 'Blocked to prevent unintended merge commits'
    fix_suggestion: 'git pull --rebase'
    tests:
      - deny: 'git pull --no-rebase'
  # Merging origin/main or origin/master while OUTSIDE a `.worktrees/<name>`
  # checkout means we're in the main worktree, which is always on the
  # default branch -- merging its own remote tracking ref is the same-branch
  # antipattern that `git pull` should handle instead. Inside a worktree
  # (`a wm new` / `/delegate-claude`, always a feature branch), merging
  # origin/main to sync with the default branch is legitimate and stays
  # allowed via the `allow: 'git [-C *] merge origin/main|origin/master *'`
  # rule further down.
  #
  # Split into bare and `-C <dir>` forms because the check must look at the
  # directory git actually operates on, not the shell's cwd: `fs.cwd` only
  # reflects the latter, so a bare `when: fs.cwd...` check here would look at
  # the wrong directory whenever `-C` is used (e.g. `git -C <worktree> merge
  # origin/main` run from the main checkout would be wrongly denied, and `git
  # -C <main-checkout> merge origin/main` run from inside a worktree would
  # wrongly bypass the deny). `flags.C` gives the `-C` form the right value
  # to check instead.
  # The worktree-allow branch of this `when` can't be covered by an inline
  # test (`InlineTestEntry` has no cwd override, so `runok test` only ever
  # exercises the deny branch from its own non-worktree cwd). If this
  # condition changes, manually re-verify by `cd`-ing into a path containing
  # `.worktrees/` and confirming `runok check --verbose` still allows.
  - deny: 'git merge origin/main|origin/master *'
    when: "!fs.cwd.contains('/.worktrees/')"
    message: 'Blocked because merging origin/main or origin/master directly (outside a worktree) creates a needless merge commit. Use `git pull` instead.'
    fix_suggestion: 'git pull'
    tests:
      - deny: 'git merge origin/main'
      - deny: 'git merge origin/master'
  - deny: 'git -C * merge origin/main|origin/master *'
    when: "!flags.C.contains('/.worktrees/')"
    message: 'Blocked because merging origin/main or origin/master directly (outside a worktree) creates a needless merge commit. Use `git pull` instead.'
    fix_suggestion: 'git -C <dir> pull'
    tests:
      - deny: 'git -C /tmp merge origin/main'
      - deny: 'git -C /tmp merge origin/master'
      - allow: 'git -C /tmp/.worktrees/foo merge origin/main'
      - allow: 'git -C /tmp/.worktrees/foo merge origin/master'
  - deny: 'git [-C *] merge !origin/main|origin/master *'
    message: 'Blocked because non-default merges should go through `git pull --rebase` to keep history linear.'
    fix_suggestion: 'git pull --rebase'
    tests:
      - deny: 'git merge origin/renovate/foo --no-edit'
      - deny: 'git merge feature-branch'
  # `-i` opens an editor and `--exec <cmd>` executes arbitrary commands during
  # rebase, both bypassing runok's command-level review.
  - deny: 'git [-C *] rebase -i|--interactive *'
    message: 'Blocked because interactive rebase opens an editor and `--exec` can run arbitrary commands.'
    tests:
      - deny: 'git rebase -i HEAD~3'
      - deny: 'git rebase --interactive HEAD~3'
      - deny: 'git rebase -i --autosquash HEAD~2'
  # Require `--` to separate ref from pathspec, so `git checkout A B` cannot
  # accidentally treat A as a branch (side effect on working tree). The third
  # `when` clause `!flags.exists(k, k == "")` is the `--` presence check:
  # runok stores the `--` separator in `flags` with an empty-string key, so
  # the absence of that key means no `--` token was present. `--theirs` /
  # `--ours` are conflict-resolution flags for the file-restore form (no
  # branch side effects), so they are exempted.
  - deny: 'git [-C *] checkout *'
    when: '!has(flags.theirs) && !has(flags.ours) && !flags.exists(k, k == "")'
    message: 'Blocked because `git checkout <branch>` or `git checkout <ref> <path>` has side effects on the working tree. Use `git checkout <ref> -- <path>` (with `--`) to restore files.'
    fix_suggestion: 'git checkout <ref> -- <path>'
    tests:
      - deny: 'git checkout main'
      - deny: 'git checkout main --quiet'
      - deny: 'git checkout -q main'
      - deny: 'git checkout HEAD~1'
      - deny: 'git checkout v1.0.0'
      - deny: 'git -C /tmp checkout main'
      - deny: 'git checkout frontend/pnpm-lock.yaml pnpm-lock.yaml'
      - allow: 'git checkout main -- file.txt'
      - allow: 'git checkout -- file.txt'
      - allow: 'git checkout --theirs file.txt'
      - allow: 'git checkout --ours file.txt'
  - deny: 'git [-C *] switch *'
    message: 'Blocked because `git switch` changes the current branch and has side effects on the working tree.'
    tests:
      - deny: 'git switch main'
      - deny: 'git -C /tmp switch main'
  - deny: 'git [-C *] checkout -b|-B *'
    message: 'Blocked because creating a branch should go through the `/delegate-claude` skill, which runs the work in an isolated worktree.'
    fix_suggestion: '/delegate-claude'
    tests:
      - deny: 'git checkout -b new-branch'
      - deny: 'git checkout -B new-branch'
      - deny: 'git -C /tmp checkout -b new-branch'
  # Branch creation routes to /delegate-claude. Two patterns are needed:
  # an optional `git [-C <dir>]` group would capture switch's own `-C`
  # (force-create) flag, so the bare form and the `git -C <dir>` form are
  # kept separate.
  - deny: 'git switch -c|-C *'
    message: 'Blocked because creating a branch should go through the `/delegate-claude` skill, which runs the work in an isolated worktree.'
    fix_suggestion: '/delegate-claude'
    tests:
      - deny: 'git switch -c new-branch'
      - deny: 'git switch -C new-branch'
  - deny: 'git -C * switch -c|-C *'
    message: 'Blocked because creating a branch should go through the `/delegate-claude` skill, which runs the work in an isolated worktree.'
    fix_suggestion: '/delegate-claude'
    tests:
      - deny: 'git -C /tmp switch -c new-branch'
      - deny: 'git -C /tmp switch -C new-branch'
  # `git branch <name>` doesn't switch the current checkout onto the new
  # branch, but still creates it outside the `/delegate-claude` flow, so
  # the same policy applies as `checkout -b`/`switch -c` above.
  - deny: 'git branch *'
    when: 'size(flags) == 0 && size(args) > 1'
    message: 'Blocked because creating a branch should go through the `/delegate-claude` skill, which runs the work in an isolated worktree.'
    fix_suggestion: '/delegate-claude'
    tests:
      - deny: 'git branch "copier-update/v0.8.13"'
      - deny: 'git branch new-test-branch'
      - deny: 'git branch fix-test-expect-split origin/main'
  - deny: 'git [-C *] worktree add *'
    message: 'Blocked because creating a worktree should go through the `/delegate-claude` skill.'
    fix_suggestion: '/delegate-claude'
    tests:
      - deny: 'git worktree add ../wt'
      - deny: 'git worktree add ../wt feature-branch'
  - deny: 'git [-C *] worktree remove *'
    message: 'Blocked because removing a worktree (with or without --force) should be done manually by the user.'
    tests:
      - deny: 'git worktree remove .worktrees/foo'
      - deny: 'git worktree remove .worktrees/foo --force'
      - deny: 'git -C /tmp worktree remove --force ~/some/path'
  - deny: 'git [-C *] branch -d|-D|--delete *'
    message: 'Blocked because deleting a branch should be done manually by the user.'
    tests:
      - deny: 'git branch -d feature/foo'
      - deny: 'git branch -D feature/foo'
      - deny: 'git branch --delete feature/foo'
      - deny: 'git branch --delete --force feature/foo'
      - deny: 'git -C /tmp branch -D feature/foo'
  - deny: 'git [-C *] reset *'
    message: 'Blocked to prevent rewriting commit history or destroying work. To unstage files, use `git restore --staged <path>` instead.'
    fix_suggestion: 'git restore --staged <path>'
    tests:
      - deny: 'git reset --hard HEAD~1'
      - deny: 'git reset --soft HEAD~1'
      - deny: 'git reset --mixed HEAD~1'
      - deny: 'git reset --hard'
      - deny: 'git reset HEAD file.txt'
      - deny: 'git -C /tmp reset --hard HEAD~1'
  # `git clean` deletes untracked files irreversibly. Dry-run (`-n` /
  # `--dry-run`) only prints what would be removed, so it is safe; other
  # destructive variants fall through to default ask, except `-fdx` on
  # <var:safe-rm-paths> (further down), which is allowed outright.
  - allow: 'git [-C *] clean -n|--dry-run *'
    tests:
      - allow: 'git clean -n'
      - allow: 'git clean -n -d'
      - allow: 'git clean --dry-run -d'
      - ask: 'git clean -fd'
      - ask: 'git clean -fdx'

  # Combined short flags (e.g. `-ndx`) are parsed as a single token and don't
  # match the `-n|--dry-run` alternation above. `-n` short-circuits actual
  # deletion regardless of what else is combined with it (git's own
  # semantics), so any token containing `n` is still a dry run; git clean's
  # only other short flags are d/e/f/i/q/x/X, none of which contain `n`.
  - allow: 'git [-C *] clean -*n* *'
    tests:
      - allow: 'git clean -ndx'
      - allow: 'git clean -ndx -e ".worktrees"'
      - allow: 'git clean -nfd'
      - allow: 'git clean -dnx'
      - allow: 'git -C /tmp/foo clean -ndx web/dist'
      - ask: 'git clean -fdx'
      - ask: 'git clean -fd'

  # Unlike `rm -r`, `git clean` never touches tracked files, so restricting
  # the destructive `-fdx` form to <var:safe-rm-paths> (build output /
  # dependency dirs, recreatable from source) is safe. `args` includes the
  # literal `clean` token alongside the path args (runok quirk: `args`
  # covers every positional, non-flag token matched by the pattern's
  # non-bracketed portion, not just the trailing `*`); `exists_one(a, a ==
  # "clean")` confirms exactly one token equals that literal (the
  # subcommand itself), so a real target directory named `clean` (which
  # would produce a second match) still falls through to ask instead of
  # being silently treated as the subcommand token.
  - allow: 'git [-C *] clean -fdx *'
    when: >-
      args.size() > 1 &&
      args.exists_one(a, a == "clean") &&
      args.all(a, a == "clean" || definitions.vars["safe-rm-paths"].exists(p, glob_matches(p, a)))
    tests:
      - allow: 'git clean -fdx web/dist'
      - allow: 'git clean -fdx node_modules'
      - allow: 'git clean -fdx node_modules dist'
      - allow: 'git clean -fdx api/node_modules node_modules web/node_modules'
      - allow: 'git clean -fdx .astro dist'
      - allow: 'git -C /tmp/foo clean -fdx web/dist'
      - ask: 'git clean -fdx'
      - ask: 'git clean -fdx src'
      - ask: 'git clean -fdx .'
      - ask: 'git clean -fdx clean'

  - deny: 'git clone *'
    message: 'Use ghq for fohte-owned repos, or opensrc for third-party code reading.'
    tests:
      - deny: 'git clone https://github.com/sindresorhus/ky'
      - deny: 'git clone git@github.com:fohte/dotfiles.git'
  - deny: 'git -c *=* *'
    message: 'Blocked because `git -c <key>=<value>` overrides config inline and almost always causes unintended behavior. Run the command without `-c`.'
    tests:
      - deny: 'git -c user.name=foo commit -m "test"'
      - deny: 'git -c commit.gpgsign=false commit -m "test"'
  # `args.size() > 2` requires an actual value token beyond `config` +
  # `user.name`/`user.email` (both counted in `args`, see the `git clean`
  # rule above), so the read form (`git config user.name`, already allowed
  # read-only by the preset) isn't caught here too.
  - deny: 'git [-C *] config user.name|user.email *'
    when: 'args.size() > 2'
    message: 'Blocked to keep changes to commit identity visible for confirmation.'
    tests:
      - deny: 'git config user.name test'
      - deny: 'git config user.email test@example.com'
      - deny: 'git -C /tmp config user.name test'
      - allow: 'git config user.name'
      - allow: 'git config --get user.name'

  # allow rules
  # `config/bin/git-main` (on PATH) is invoked by git's subcommand dispatch
  # as `git main`; it only reads (`git branch -l master main`).
  - allow: 'git main'
    tests:
      - allow: 'git main'
  # `--check`/`--stat`/`--summary`/`--numstat` turn off actual application
  # (git-apply(1)); `--apply` is excluded because it re-enables application
  # after one of those flags, which would defeat the dry-run guarantee.
  - allow: 'git [-C *] apply *'
    when: >-
      (has(flags.check) || has(flags.stat) || has(flags.summary) || has(flags.numstat)) &&
      !has(flags.apply)
    tests:
      - allow: 'git apply --stat /tmp/x.patch'
      - allow: 'git apply --check /tmp/x.patch'
      - allow: 'git apply --recount --cached --check /tmp/x.patch'
      - allow: 'git -C /tmp apply --check /tmp/x.patch'
      - ask: 'git apply --check --apply /tmp/x.patch'
  # `--cached` applies the patch to the index only, never the working
  # tree (git-apply(1)), and is reversible via the already-allowed
  # `restore --staged`. `--index` also touches the working tree; `--reject`
  # writes `*.rej` files there too; `--build-fake-ancestor` writes an
  # arbitrary caller-chosen path; `-3`/`--3way` adds conflict-resolution
  # complexity not seen in real usage -- all excluded per least privilege.
  - allow: 'git [-C *] apply *'
    when: >-
      has(flags.cached) && !has(flags.index) && !has(flags.reject) &&
      !flags.exists(k, k == '3way' || k == '3' || k == 'build-fake-ancestor')
    tests:
      - allow: 'git apply --cached /tmp/x.patch'
      - allow: 'git apply --recount --cached --include=foo.ts /tmp/x.patch'
      - allow: 'git -C /tmp apply --cached /tmp/x.patch'
      - ask: 'git apply --cached --index /tmp/x.patch'
      - ask: 'git apply --cached --reject /tmp/x.patch'
      - ask: 'git apply --cached --build-fake-ancestor=/tmp/fake /tmp/x.patch'
      - ask: 'git apply --cached --3way /tmp/x.patch'
      - ask: 'git apply /tmp/x.patch'
  - allow: 'git [-C *] add *'
    tests:
      - allow: 'git add .'
      - allow: 'git add -A'
  - allow: 'git [-C *] checkout * -- *'
    tests:
      - allow: 'git checkout main -- file.txt'
  - allow: 'git [-C *] checkout *'
    when: 'has(flags.theirs) || has(flags.ours)'
    tests:
      - allow: 'git checkout --theirs file.txt'
      - allow: 'git checkout --ours file.txt'
  - allow: 'git [-C *] commit *'
    tests:
      - allow: 'git commit -m "feat: add feature"'
  - allow: 'git [-C *] commit -m *'
  - allow: 'git [-C *] fetch *'
    tests:
      - allow: 'git fetch origin'
  # Inside a `.worktrees/<name>` checkout (`a wm new` / `/delegate-claude`),
  # this is the only rule that matches (the cwd-gated deny above requires
  # being outside `.worktrees/`), so it stays allow there.
  - allow: 'git [-C *] merge origin/main|origin/master *'
  # --continue / --abort / --skip progress or unwind an in-progress rebase
  # without rewriting history beyond the original `git rebase` invocation.
  - allow: 'git [-C *] rebase --continue|--abort|--skip *'
    tests:
      - allow: 'git rebase --continue'
      - allow: 'git rebase --abort'
      - allow: 'git rebase --skip'
      - allow: 'git rebase --continue --no-edit'
      - allow: 'git -C /tmp rebase --continue'
  - allow: 'git [-C *] merge --continue|--abort'
    tests:
      - allow: 'git merge --continue'
      - allow: 'git merge --abort'
  - allow: 'git [-C *] mv *'
  - allow: 'git [-C *] pull *'
    tests:
      - allow: 'git pull'
      - allow: 'git pull --rebase'
  - allow: 'git [-C *] push *'
    tests:
      - allow: 'git -C /tmp push origin main'
  # Bare `restore <path>` discards only the named files' uncommitted
  # changes (copied straight from the index/a ref), the same risk class as
  # the already-allowed `checkout <ref> -- <path>` above -- `--source` is
  # its direct modern equivalent. `-p`/`--patch` is excluded because it
  # opens an editor for hunk editing (git-add(1) EDITING PATCHES), the
  # same category `rebase -i` is denied for. This subsumes `--staged`
  # (unstaging only, already the narrowest case), so there's no separate
  # `restore --staged` rule below.
  - allow: 'git [-C *] restore *'
    when: '!has(flags.p) && !has(flags.patch)'
    tests:
      - allow: 'git restore src/foo.ts'
      - allow: 'git restore .'
      - allow: 'git restore -- .'
      - allow: 'git restore --worktree src/index.ts'
      - allow: 'git restore --source=HEAD~2 file.txt'
      - allow: 'git -C /tmp restore file.txt'
      - allow: 'git restore --staged file.txt'
      - allow: 'git restore --staged .'
      - allow: 'git -C /tmp restore --staged file.txt'
      - ask: 'git restore -p file.txt'
      - ask: 'git restore --patch file.txt'
  - allow: 'git [-C *] stash'
    tests:
      - allow: 'git stash'
  # `-u`/`-a` extend what gets stashed (untracked / untracked+ignored), but
  # `git stash pop` still fully restores it — no more destructive than a
  # bare `git stash`. `-m`/`--message` only labels the stash entry.
  - allow: 'git [-C *] stash [-u|--include-untracked] [-a|--all] [-m|--message *]'
    tests:
      - allow: 'git stash -u'
      - allow: 'git stash --include-untracked'
      - allow: 'git stash -a'
      - allow: 'git -C /tmp/foo stash -u'
      - allow: 'git stash -u -m "wip: lockfile regen attempt"'
      - allow: 'git stash -m "wip"'
      - ask: 'git stash -u extra-arg'
  - allow: 'git [-C *] stash push *'
    tests:
      - allow: 'git stash push'
      - allow: 'git stash push pnpm-lock.yaml'
      - allow: 'git stash push -m "wip"'
  # `[--index] [-q|--quiet] [<stash>]` mirrors `git stash pop`'s own usage
  # line; popping a specific ref is no more destructive than popping the
  # top entry (both apply-then-drop a single stash, recoverable from
  # `git fsck --unreachable` if the apply conflicts).
  - allow: 'git [-C *] stash pop [--index] [-q|--quiet] *'
    tests:
      - allow: 'git stash pop'
      - allow: 'git stash pop stash@{0}'
      - allow: 'git stash pop --index stash@{1}'
  - allow: 'git [-C *] stash drop *'
    tests:
      - allow: 'git stash drop'
      - allow: 'git stash drop stash@{0}'
      - allow: 'git stash drop -q stash@{1}'
  - allow: 'git [-C *] submodule update *'
    tests:
      - allow: 'git submodule update --init --recursive'
  - allow: 'git [-C *] rm *'
    tests:
      - allow: 'git rm file.txt'
      - allow: 'git rm -r dir'
      - allow: 'git rm --cached file.txt'
      - allow: 'git rm -f file.txt'
      - allow: 'git rm --force file.txt'
      - allow: 'git rm -rf dir'
      - allow: 'git -C /tmp rm -f file.txt'
  # `git init` is idempotent on an existing repo and never overwrites
  # existing content, except `--separate-git-dir` (moves the repo) and
  # `--template` (can inject arbitrary files, including enabled hooks,
  # into .git) — neither is declared here, so either falls through to ask.
  - allow: 'git [-C *] init [-q] [-b *]'
    tests:
      - allow: 'git init -q'
      - allow: 'git init -q -b master'
      - allow: 'git init'
      - allow: 'git init -b master'
      - allow: 'git -C /tmp init -q'
      - ask: 'git init --separate-git-dir /tmp/evil'
      - ask: 'git init --template=/tmp/evil'
      - ask: 'git init --shared=all'
      - ask: 'git init /tmp/newrepo'
      - ask: 'git init -b master extra-dir'
  # No flags at all: `-x`/`-s`/`-e` etc. are fine on their own merits, but
  # `--strategy`/`-X|--strategy-option` can invoke a `git-merge-<strategy>`
  # executable, so the simplest safe cut is zero flags. `size(args) > 1`
  # requires at least one commit-ish beyond the literal `cherry-pick`
  # token (`args` includes it, see the `git clean` rule above).
  - allow: 'git cherry-pick *'
    when: 'size(flags) == 0 && size(args) > 1'
    tests:
      - allow: 'git cherry-pick bd8c9c3'
      - allow: 'git cherry-pick 2c505402 6bb428c3'
      - ask: 'git cherry-pick -x abc1234'
      - ask: 'git cherry-pick -s abc1234'
      - ask: 'git cherry-pick --strategy=recursive abc1234'
      - ask: 'git cherry-pick -X ours abc1234'
  - allow: 'git -C * cherry-pick *'
    when: "!flags.exists(k, k != 'C') && size(args) > 1"
    tests:
      - allow: 'git -C /tmp cherry-pick abc1234'
  - allow: 'git [-C *] cherry-pick --continue|--abort|--skip'
    tests:
      - allow: 'git cherry-pick --continue'
      - allow: 'git cherry-pick --abort'
      - allow: 'git cherry-pick --skip'
      - allow: 'git -C /tmp cherry-pick --continue'

  # gh
  - deny: 'gh [-R *] api * --paginate *'
    message: 'Blocked to prevent excessive API rate limit consumption'
    tests:
      - deny: 'gh api /repos --paginate'
      - deny: 'gh -R foo/bar api /repos --paginate'
  - deny: 'gh repo set-default *'
    message: 'Blocked to prevent unintended operations on wrong repository'
    tests:
      - deny: 'gh repo set-default foo/bar'
  - deny: 'gh repo clone *'
    message: 'Use ghq for fohte-owned repos, or opensrc for third-party code reading.'
    tests:
      - deny: 'gh repo clone foo/bar'
  - deny: 'gh [-R *] api [-X GET] * repos/*/contents* *'
    message: 'Use ghq (fohte-owned) or opensrc (third-party) to read repo file contents instead of `gh api .../contents/...`.'
    fix_suggestion: 'ghq get -u <org>/<repo> && cd ~/ghq/github.com/<org>/<repo>; or `opensrc path <pkg>` for third-party.'
    tests:
      - deny: 'gh api repos/fohte/generic-boilerplate/contents/foo'
      - deny: 'gh api repos/fohte/foo/contents/bar?ref=v1'
      - deny: 'gh api repos/fohte/foo/contents'
      - deny: 'gh api repos/fohte/foo/contents?ref=main'
      - deny: 'gh -R fohte/foo api -X GET repos/fohte/foo/contents/bar'
      - deny: 'gh api repos/fohte/foo/contents/bar -f ref=main'
      - deny: 'gh api -f ref=main repos/fohte/foo/contents/bar'
      - deny: 'gh api "repos/fohte/copier-update-action/contents/action.yml" -F ref=b6cf0fa2396de17ddd38c98782c8143d423caa09 --jq ".content"'
      - deny: 'gh api repos/sindresorhus/ky/contents/readme.md --jq .content'
      - allow: 'gh api -X GET /repos'
  - deny: 'gh log *'
    message: 'Not a valid gh command, did you mean `gh run watch`?'
  - deny: 'gh [-R *] issue comment *'
    message: 'Use /github-issue skill'
    tests:
      - deny: 'gh issue comment 123'
  - deny: 'gh [-R *] pr edit * --body|-b|--body-file|-F *'
    when: '!env.PWD.startsWith(env.HOME + "/ghq/github.com/fohte/specs")'
    message: 'Use /create-pr skill to edit PR body.'
    tests:
      - deny: 'gh pr edit 285 --body "foo"'
      - deny: 'gh pr edit 285 -b "foo"'
      - deny: 'gh pr edit 285 --body-file foo.md'
      - deny: 'gh -R fohte/runok pr edit 285 --body "foo"'
      - ask: 'gh pr edit 285 --title "foo"'
      - ask: 'gh -R fohte/runok pr edit 285 --title "foo"'
  - deny: 'gh [-R *] pr create *'
    when: '!env.PWD.startsWith(env.HOME + "/ghq/github.com/fohte/specs")'
    message: 'Use /create-pr skill to create PRs.'
    tests:
      - deny: 'gh pr create --title "foo" --body "bar"'
      - deny: 'gh -R fohte/runok pr create --title "foo"'

  - allow: 'gh [-R *] pr edit * --add-label|--remove-label *'
    tests:
      - allow: 'gh pr edit 25 --add-label "bump:minor"'
      - allow: 'gh pr edit 25 --remove-label "bump:minor"'
      - allow: 'gh -R fohte/runok pr edit 25 --add-label foo'
      - deny: 'gh pr edit 25 --body "foo" --add-label bar'

  - allow: 'gh [-R *] * list *'
  - allow: 'gh [-R *] * view *'
  - allow: 'gh [-R *] api -X GET *'
    tests:
      - allow: 'gh api -X GET /repos'
      - allow: 'gh -R foo/bar api -X GET /repos'
  - allow: 'gh [-R *] browse *'
  - allow: 'gh [-R *] pr checks *'
  - allow: 'gh [-R *] pr diff *'
  - allow: 'gh [-R *] run watch *'
  - allow: 'gh [-R *] search *'
  - allow: 'gh [-R *] run download *'
  - allow: 'gh [-R *] run rerun * --failed'
    tests:
      - allow: 'gh run rerun 123 --failed'
      - allow: 'gh -R foo/bar run rerun 123 --failed'
      - ask: 'gh run rerun 123'
  - allow: 'gh [-R *] project item-*|field-list *'
  - ask: 'gh [-R *] project item-delete *'
    tests:
      - ask: 'gh project item-delete 123'

  # ghq
  - allow: 'ghq get *'
  - allow: 'ghq list *'
  - allow: 'ghq root'
