# yaml-language-server: $schema=https://raw.githubusercontent.com/fohte/runok/main/schema/runok.schema.json

rules:
  # deny rules
  - deny: 'git [-C *] commit --amend *'
    message: 'Blocked to prevent rewriting previous commit which may destroy work'
    fix_suggestion: 'git commit -m "fix: ..."'
    tests:
      - deny: 'git commit --amend'
      - deny: 'git -C /tmp commit --amend --no-edit'
  - deny: 'git [-C *] commit --no-gpg-sign *'
    message: 'Blocked to ensure commits are always GPG signed'
    fix_suggestion: 'git commit -m "..."'
    tests:
      - deny: 'git commit --no-gpg-sign -m "test"'
  - deny: 'git [-C *] commit -n|--no-verify *'
    message: 'Blocked to ensure pre-commit hooks always run'
    fix_suggestion: 'git commit -m "..."'
    tests:
      - deny: 'git commit --no-verify -m "test"'
      - deny: 'git commit -n -m "test"'
  - deny: 'git [-C *] push --force-with-lease *'
    message: 'Blocked to prevent rewriting remote history'
    tests:
      - deny: 'git push --force-with-lease origin main'
  - deny: 'git [-C *] push --force *'
    message: 'Blocked to prevent rewriting remote history'
    fix_suggestion: 'git push'
    tests:
      - deny: 'git push --force origin main'
  - deny: 'git [-C *] push -f *'
    message: 'Blocked to prevent rewriting remote history'
    fix_suggestion: 'git push'
    tests:
      - deny: 'git push -f origin main'
  - deny: 'git [-C *] rebase origin/main|origin/master *'
    message: 'Blocked to prevent unintended rewriting of commit history'
    fix_suggestion: 'git merge origin/main or origin/master'
    tests:
      - deny: 'git rebase origin/main'
      - deny: 'git rebase origin/master'
  - deny: 'git [-C *] pull --no-rebase *'
    message: 'Blocked to prevent unintended merge commits'
    fix_suggestion: 'git pull --rebase'
    tests:
      - deny: 'git pull --no-rebase'
  - deny: 'git [-C *] merge origin/* *'
    message: 'Blocked because syncing with origin should go through `git pull --rebase` to keep history linear.'
    fix_suggestion: 'git pull --rebase'
    tests:
      - deny: 'git merge origin/main'
      - deny: 'git merge origin/master'
      - deny: 'git merge origin/renovate/foo --no-edit'
      - ask: 'git merge feature-branch'
  # `-i` opens an editor and `--exec <cmd>` executes arbitrary commands during
  # rebase, both bypassing runok's command-level review.
  - deny: 'git [-C *] rebase -i|--interactive *'
    message: 'Blocked because interactive rebase opens an editor and `--exec` can run arbitrary commands.'
    tests:
      - deny: 'git rebase -i HEAD~3'
      - deny: 'git rebase --interactive HEAD~3'
      - deny: 'git rebase -i --autosquash HEAD~2'
  # Require `--` to separate ref from pathspec, so `git checkout A B` cannot
  # accidentally treat A as a branch (side effect on working tree). The third
  # `when` clause `!flags.exists(k, k == "")` is the `--` presence check:
  # runok stores the `--` separator in `flags` with an empty-string key, so
  # the absence of that key means no `--` token was present. `--theirs` /
  # `--ours` are conflict-resolution flags for the file-restore form (no
  # branch side effects), so they are exempted.
  - deny: 'git [-C *] checkout *'
    when: '!has(flags.theirs) && !has(flags.ours) && !flags.exists(k, k == "")'
    message: 'Blocked because `git checkout <branch>` or `git checkout <ref> <path>` has side effects on the working tree. Use `git checkout <ref> -- <path>` (with `--`) to restore files.'
    fix_suggestion: 'git checkout <ref> -- <path>'
    tests:
      - deny: 'git checkout main'
      - deny: 'git checkout main --quiet'
      - deny: 'git checkout -q main'
      - deny: 'git checkout HEAD~1'
      - deny: 'git checkout v1.0.0'
      - deny: 'git -C /tmp checkout main'
      - deny: 'git checkout frontend/pnpm-lock.yaml pnpm-lock.yaml'
      - allow: 'git checkout main -- file.txt'
      - allow: 'git checkout -- file.txt'
      - allow: 'git checkout --theirs file.txt'
      - allow: 'git checkout --ours file.txt'
  - deny: 'git [-C *] switch *'
    message: 'Blocked because `git switch` changes the current branch and has side effects on the working tree.'
    tests:
      - deny: 'git switch main'
      - deny: 'git -C /tmp switch main'
  - deny: 'git [-C *] checkout -b|-B *'
    message: 'Blocked because creating a branch should go through the `/delegate-claude` skill, which runs the work in an isolated worktree.'
    fix_suggestion: '/delegate-claude'
    tests:
      - deny: 'git checkout -b new-branch'
      - deny: 'git checkout -B new-branch'
      - deny: 'git -C /tmp checkout -b new-branch'
  # Branch creation routes to /delegate-claude. Two patterns are needed:
  # an optional `git [-C <dir>]` group would capture switch's own `-C`
  # (force-create) flag, so the bare form and the `git -C <dir>` form are
  # kept separate.
  - deny: 'git switch -c|-C *'
    message: 'Blocked because creating a branch should go through the `/delegate-claude` skill, which runs the work in an isolated worktree.'
    fix_suggestion: '/delegate-claude'
    tests:
      - deny: 'git switch -c new-branch'
      - deny: 'git switch -C new-branch'
  - deny: 'git -C * switch -c|-C *'
    message: 'Blocked because creating a branch should go through the `/delegate-claude` skill, which runs the work in an isolated worktree.'
    fix_suggestion: '/delegate-claude'
    tests:
      - deny: 'git -C /tmp switch -c new-branch'
      - deny: 'git -C /tmp switch -C new-branch'
  - deny: 'git [-C *] worktree add *'
    message: 'Blocked because creating a worktree should go through the `/delegate-claude` skill.'
    fix_suggestion: '/delegate-claude'
    tests:
      - deny: 'git worktree add ../wt'
      - deny: 'git worktree add ../wt feature-branch'
  - deny: 'git [-C *] reset *'
    message: 'Blocked to prevent rewriting commit history or destroying work. To unstage files, use `git restore --staged <path>` instead.'
    fix_suggestion: 'git restore --staged <path>'
    tests:
      - deny: 'git reset --hard HEAD~1'
      - deny: 'git reset --soft HEAD~1'
      - deny: 'git reset --mixed HEAD~1'
      - deny: 'git reset --hard'
      - deny: 'git reset HEAD file.txt'
      - deny: 'git -C /tmp reset --hard HEAD~1'
  - deny: 'git clone *'
    message: 'Use ghq for fohte-owned repos, or opensrc for third-party code reading.'
    tests:
      - deny: 'git clone https://github.com/sindresorhus/ky'
      - deny: 'git clone git@github.com:fohte/dotfiles.git'
  - deny: 'git -c *=* *'
    message: 'Blocked because `git -c <key>=<value>` overrides config inline and almost always causes unintended behavior. Run the command without `-c`.'
    tests:
      - deny: 'git -c user.name=foo commit -m "test"'
      - deny: 'git -c commit.gpgsign=false commit -m "test"'

  # allow rules
  - allow: 'git [-C *] add *'
    tests:
      - allow: 'git add .'
      - allow: 'git add -A'
  - allow: 'git [-C *] checkout * -- *'
    tests:
      - allow: 'git checkout main -- file.txt'
  - allow: 'git [-C *] checkout *'
    when: 'has(flags.theirs) || has(flags.ours)'
    tests:
      - allow: 'git checkout --theirs file.txt'
      - allow: 'git checkout --ours file.txt'
  - allow: 'git [-C *] commit *'
    tests:
      - allow: 'git commit -m "feat: add feature"'
  - allow: 'git [-C *] commit -m *'
  - allow: 'git [-C *] fetch *'
    tests:
      - allow: 'git fetch origin'
  # --continue / --abort drive an in-progress rebase or merge to a known state.
  # Both are history-non-destructive: continue advances the same rewrite, abort
  # restores the pre-operation HEAD. Trailing `*` absorbs flags like `--no-edit`.
  - allow: 'git [-C *] rebase --continue|--abort *'
    tests:
      - allow: 'git rebase --continue'
      - allow: 'git rebase --abort'
      - allow: 'git rebase --continue --no-edit'
      - allow: 'git -C /tmp rebase --continue'
  - allow: 'git [-C *] merge --continue|--abort'
    tests:
      - allow: 'git merge --continue'
      - allow: 'git merge --abort'
  - allow: 'git [-C *] mv *'
  - allow: 'git [-C *] pull *'
    tests:
      - allow: 'git pull'
      - allow: 'git pull --rebase'
  - allow: 'git [-C *] push *'
    tests:
      - allow: 'git push origin main'
  - allow: 'git [-C *] restore --staged *'
    tests:
      - allow: 'git restore --staged file.txt'
      - allow: 'git restore --staged .'
      - allow: 'git -C /tmp restore --staged file.txt'
  - allow: 'git [-C *] stash'
    tests:
      - allow: 'git stash'
  - allow: 'git [-C *] stash pop'
    tests:
      - allow: 'git stash pop'
  - allow: 'git [-C *] rm *'
    tests:
      - allow: 'git rm file.txt'
      - allow: 'git rm -r dir'
      - allow: 'git rm --cached file.txt'
      - allow: 'git rm -f file.txt'
      - allow: 'git rm --force file.txt'
      - allow: 'git rm -rf dir'
      - allow: 'git -C /tmp rm -f file.txt'

  # gh
  - deny: 'gh [-R *] api * --paginate *'
    message: 'Blocked to prevent excessive API rate limit consumption'
    tests:
      - deny: 'gh api /repos --paginate'
      - deny: 'gh -R foo/bar api /repos --paginate'
  - deny: 'gh repo set-default *'
    message: 'Blocked to prevent unintended operations on wrong repository'
    tests:
      - deny: 'gh repo set-default foo/bar'
  - deny: 'gh repo clone *'
    message: 'Use ghq for fohte-owned repos, or opensrc for third-party code reading.'
    tests:
      - deny: 'gh repo clone foo/bar'
  - deny: 'gh [-R *] api [-X GET] repos/*/contents*'
    message: 'Use ghq (fohte-owned) or opensrc (third-party) to read repo file contents instead of `gh api .../contents/...`.'
    fix_suggestion: 'ghq get -u <org>/<repo> && cd ~/ghq/github.com/<org>/<repo>; or `opensrc path <pkg>` for third-party.'
    tests:
      - deny: 'gh api repos/fohte/generic-boilerplate/contents/foo'
      - deny: 'gh api repos/fohte/foo/contents/bar?ref=v1'
      - deny: 'gh api repos/fohte/foo/contents'
      - deny: 'gh api repos/fohte/foo/contents?ref=main'
      - deny: 'gh -R fohte/foo api -X GET repos/fohte/foo/contents/bar'
      - allow: 'gh api -X GET /repos'
  - deny: 'gh log *'
    message: 'Not a valid gh command, did you mean `gh run watch`?'
  - deny: 'gh [-R *] issue comment *'
    message: 'Use /github-issue skill'
    tests:
      - deny: 'gh issue comment 123'
  - deny: 'gh [-R *] pr edit * --body|-b|--body-file|-F *'
    when: '!env.PWD.startsWith(env.HOME + "/ghq/github.com/fohte/specs")'
    message: 'Use /create-pr skill to edit PR body.'
    tests:
      - deny: 'gh pr edit 285 --body "foo"'
      - deny: 'gh pr edit 285 -b "foo"'
      - deny: 'gh pr edit 285 --body-file foo.md'
      - deny: 'gh -R fohte/runok pr edit 285 --body "foo"'
      - ask: 'gh pr edit 285 --title "foo"'
      - ask: 'gh -R fohte/runok pr edit 285 --title "foo"'
  - deny: 'gh [-R *] pr create *'
    when: '!env.PWD.startsWith(env.HOME + "/ghq/github.com/fohte/specs")'
    message: 'Use /create-pr skill to create PRs.'
    tests:
      - deny: 'gh pr create --title "foo" --body "bar"'
      - deny: 'gh -R fohte/runok pr create --title "foo"'

  - allow: 'gh [-R *] * list *'
  - allow: 'gh [-R *] * view *'
  - allow: 'gh [-R *] api -X GET *'
    tests:
      - allow: 'gh api -X GET /repos'
      - allow: 'gh -R foo/bar api -X GET /repos'
  - allow: 'gh [-R *] browse *'
  - allow: 'gh [-R *] pr checks *'
  - allow: 'gh [-R *] pr diff *'
  - allow: 'gh [-R *] run watch *'
  - allow: 'gh [-R *] search *'
  - allow: 'gh [-R *] run download *'
  - allow: 'gh [-R *] run rerun * --failed'
    tests:
      - allow: 'gh run rerun 123 --failed'
      - allow: 'gh -R foo/bar run rerun 123 --failed'
      - ask: 'gh run rerun 123'
  - allow: 'gh [-R *] project item-*|field-list *'
  - ask: 'gh [-R *] project item-delete *'
    tests:
      - ask: 'gh project item-delete 123'

  # ghq
  - allow: 'ghq get *'
  - allow: 'ghq list *'
  - allow: 'ghq root'
