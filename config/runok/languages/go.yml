# yaml-language-server: $schema=https://raw.githubusercontent.com/fohte/runok/main/schema/runok.schema.json

rules:
  - allow: 'go doc *'
    tests:
      - allow: 'go doc fmt'
  - allow: 'go help *'
    tests:
      - allow: 'go help get'
      - allow: 'go help mod edit'
  - allow: 'go env *'
  - allow: 'go version *'
  - allow: 'go build|test|vet|list *'
  # `go get` only modifies go.mod/go.sum and the module cache; code from
  # fetched deps does not run until a separate `go build`/`go run`, which is
  # trust-gated (see trusted-repos.yml). Allowed unconditionally so dep work
  # in third-party repos doesn't prompt.
  - allow: 'go get *'
    tests:
      - allow: 'go get github.com/foo/bar@v1.2.3'
      - allow: 'go get -u ./...'
      - allow: 'go get golang.org/x/tools/cover'
  - allow: 'go mod init|edit|why|graph|verify|download|tidy *'
    tests:
      - allow: 'go mod init covcheck'
      - allow: 'go mod edit -go=1.23.0'
      - allow: 'go mod tidy'
  # `go run` / `go generate` are trust-gated; see trusted-repos.yml.
  - allow: 'go tool *'
  - allow: 'gotest *'
  - allow: 'gofmt *'
  - allow: 'goimports *'
  - allow: 'golangci-lint *'
  - allow: 'staticcheck *'
  - allow: 'errcheck *'
