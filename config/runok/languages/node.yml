# yaml-language-server: $schema=https://raw.githubusercontent.com/fohte/runok/main/schema/runok.schema.json

definitions:
  aliases:
    # corepack ships a pnpm shim; alias keeps pnpm rules in sync with it.
    pnpm:
      - pnpm
      - corepack pnpm

rules:
  # install (use ni)
  # Bool flags with no `=value` and not registry/config/-C|--dir/-g|--global
  # (those can redirect package source or execution scope) are safe to
  # fast-track allow. Otherwise verify via pnpm docs / ni source
  # (src/parse.ts) first.
  - allow: 'ni [--frozen-lockfile|--frozen|--no-frozen-lockfile|--frozen=false|--frozen=true|--frozen-lockfile=false|--frozen-lockfile=true] [--lockfile-only] [--force] [--frozen-if-present] [--strict-peer-dependencies]'
    tests:
      - allow: 'ni'
      - allow: 'ni --frozen-lockfile'
      - allow: 'ni --lockfile-only'
      - allow: 'ni --frozen'
      - allow: 'ni --no-frozen-lockfile'
      - allow: 'ni --frozen=false'
      - allow: 'ni --frozen-lockfile=false'
      - allow: 'ni --frozen=false --lockfile-only'
      - allow: 'ni --force'
      - allow: 'ni --frozen-if-present'
      - allow: 'ni --strict-peer-dependencies'
      - allow: 'ni --frozen-if-present --strict-peer-dependencies'

  # clean install (use nci)
  - allow: 'nci [--frozen-lockfile|--no-frozen-lockfile|--frozen-lockfile=false|--frozen-lockfile=true|--lockfile-only]'
    tests:
      - allow: 'nci'
      - allow: 'nci --no-frozen-lockfile'
      - allow: 'nci --lockfile-only'

  # uninstall (use nun)
  - allow: 'nun *'
    tests:
      - allow: 'nun lodash'
      - allow: 'nun node-pg-migrate pg @types/pg'
  - deny: 'nun -g|--global *'
    message: 'BLOCKED: Global uninstall is not allowed via nun. Drop -g/--global.'
    tests:
      - deny: 'nun -g typescript'
      - deny: 'nun --global typescript'

  # enforce ni -E (exact pinning) in fohte's repos
  - allow: 'ni -E *'
    when: "env.PWD.startsWith(env.HOME + '/ghq/github.com/fohte/')"
  - deny: 'ni !-E *'
    when: "env.PWD.startsWith(env.HOME + '/ghq/github.com/fohte/') && size(args) > 0"
    message: 'BLOCKED: Use ni -E to pin exact versions in fohte repos.'
    fix_suggestion: 'ni -E <pkg>'

  # run scripts (use nr)
  - allow: 'nr [-C|--filter *] build|build:*|build-* *'
  - allow: 'nr [-C|--filter *] format|format:* *'
  - allow: 'nr [-C|--filter *] lint|lint:* *'
  - allow: 'nr [-C|--filter *] vitest|test|test:*|typecheck *'
    tests:
      - allow: 'nr test'
      - allow: 'nr test:type'
  - allow: 'nr [-C|--filter *] storybook|storybook:* *'
    tests:
      - allow: 'nr storybook'
      - allow: 'nr storybook:build'
  - allow: 'nr [-C|--filter *] generate|generate:* *'
    tests:
      - allow: 'nr generate'
      - allow: 'nr generate:api'
  - allow: 'nr tsr generate'
    tests:
      - allow: 'nr tsr generate'
  # DB migration file generation (drizzle-kit / prisma migrate diff).
  # Narrower than db:* — db:migrate / db:push apply to the actual DB.
  - allow: 'nr db:generate'
    tests:
      - allow: 'nr db:generate'
  - deny: 'nlx|na [-C|--filter *] tsc *'
    message: 'Use nr'
    tests:
      - deny: 'nlx tsc --noEmit'
      - deny: 'na tsc --noEmit'
      - deny: 'na -C packages/web tsc --noEmit'
  # `-C`/`--filter` is optional here (unlike the `na -C|--filter * run *`
  # rule below) since there's no broader `na vitest *` catch-all this could
  # shadow.
  - deny: 'nlx|na [-C|--filter *] vitest run *'
    message: 'Use nr'
    fix_suggestion: 'nr vitest run <file> (use -C or --filter <workspace> to scope)'
    tests:
      - deny: 'nlx vitest run src/foo.test.ts'
      - deny: 'na vitest run src/foo.test.ts'
      - deny: 'na --filter web vitest run src/foo.test.ts'
      - deny: 'na -C packages/web vitest run src/foo.test.ts'
  - deny: 'nlx|na [-C|--filter *] eslint *'
    message: 'Use nr'
    tests:
      - deny: 'nlx eslint --fix .'
      - deny: 'na eslint .'
      - deny: 'na -C packages/web eslint .'
  # tsx needs the same fs-write sandboxing as `node *`, but nlx (dlx-style
  # exec) also needs network + writable cache dirs to resolve the package —
  # sandboxing that would open network to the executed script too.
  # `tsx@*` also matches version-pinned runs (mirrors `nlx prettier|prettier@* *`
  # above).
  - deny: 'nlx tsx|tsx@* *'
    message: 'BLOCKED: nlx tsx needs network + its own cache dirs, which cannot be sandboxed safely. If the script only uses erasable TS syntax (no JSX/enum/namespace), use node <script>.ts instead (already covered by the node * rule); otherwise this needs manual review.'
    fix_suggestion: 'node <script>.ts (only if the script avoids JSX/enum/namespace)'
    tests:
      - deny: 'nlx tsx script.ts'
      - deny: 'nlx tsx --version'
      - deny: 'nlx tsx@4.19.2 script.ts'
      - deny: 'nlx -p tsx@4.19.2 script.ts'

  # prettier is a safe formatter/checker; no nr indirection needed.
  # `prettier@*` also matches version-pinned runs (e.g. prettier@3.8.3).
  - allow: 'nlx prettier|prettier@* *'
    tests:
      - allow: 'nlx prettier --check config/karabiner/karabiner.json'
      - allow: 'nlx prettier --write src/index.ts'
      - allow: 'nlx prettier@3.8.3 --check check.json'
  # TanStack Router code generation only writes route files in the project.
  # Other tsr subcommands are not vetted yet.
  - allow: 'nlx tsr generate'
    tests:
      - allow: 'nlx tsr generate'
  # `playwright install` only downloads browser binaries into the
  # ms-playwright cache. `--with-deps` is excluded: on Linux it shells out to
  # the OS package manager via sudo (apt-get install) to add system deps.
  - allow: 'nlx playwright|playwright@* install chromium'
    tests:
      - allow: 'nlx playwright install chromium'
      - allow: 'nlx playwright@1.61.1 install chromium'
      - ask: 'nlx playwright install --with-deps chromium'

  # Force ni-family shortcuts (ni / nci / nun / nup / nr / nlx). Escape
  # hatch for non-write subcommands: `na <args>` (allowed below).
  # pnpm is a separate rule because the `pnpm` alias (pnpm | corepack pnpm)
  # does not expand inside pattern alternation.
  - deny: 'pnpm *'
    message: &pmforce_msg 'BLOCKED: Use /ni skill.'
    fix_suggestion: &pmforce_fix 'ni / nr / nlx / na <args>'
    tests:
      - deny: 'pnpm install'
      - deny: 'pnpm add axios'
      - deny: 'pnpm build'
      - deny: 'pnpm vitest run src/plugins/llm-agent'
      - deny: 'pnpm typecheck'
      - deny: 'pnpm tsc --noEmit'
      - deny: 'pnpm test --run'
      - deny: 'pnpm test:unit -- src/plugins/llm-agent/response-handler.test.ts'
      - deny: 'pnpm generate:api'
      - deny: 'pnpm format:prettier src/lib/api/schema.gen.d.ts'
      - deny: 'pnpm run build'
      - deny: 'pnpm remove lodash'
      - deny: 'pnpm dlx eslint --fix .'
      - deny: 'pnpm update'
      - deny: 'pnpm config set verify-deps-before-run never --location=project'
      - deny: 'corepack pnpm install --frozen-lockfile'
      - deny: 'corepack pnpm config set verify-deps-before-run never --location=project'

  - deny: 'npm|bun|yarn *'
    message: *pmforce_msg
    fix_suggestion: *pmforce_fix
    tests:
      - deny: 'npm install axios'
      - deny: 'npm install -D typescript'
      - deny: 'npm run build'
      - deny: 'npm ci'
      - deny: 'npm uninstall lodash'
      - deny: 'npm update'
      - deny: 'yarn add axios'
      - deny: 'yarn install'
      - deny: 'yarn run build'
      - deny: 'yarn remove lodash'
      - deny: 'yarn dlx eslint --fix .'
      - deny: 'bun install'
      - deny: 'bun add axios'
      - deny: 'bun run build'
      - deny: 'bun remove lodash'
      - deny: 'bun update'

  - deny: 'npx|bunx *'
    message: 'BLOCKED: Use /ni skill. Use nlx.'
    fix_suggestion: 'nlx <pkg>'
    tests:
      - deny: 'npx eslint --fix .'
      - deny: 'bunx eslint --fix .'

  # `nlx npm ...` / `nlx pnpm ...` dlx-executes the npm/pnpm CLI itself,
  # which is the same bypass as calling them directly. Read-only queries
  # (view/why/etc) should go through `na` instead. `npm@*`/`pnpm@*` covers
  # version-pinned dlx invocations (mirrors `nlx prettier|prettier@* *` above).
  - deny: 'nlx npm|pnpm|npm@*|pnpm@* *'
    message: *pmforce_msg
    fix_suggestion: *pmforce_fix
    tests:
      - deny: 'nlx npm view @vitest/browser versions --json'
      - deny: 'nlx npm view @opentelemetry/exporter-trace-otlp-http@0.220.0 peerDependencies dependencies --json'
      - deny: 'nlx npm install axios'
      - deny: 'nlx pnpm why eslint-plugin-simple-import-sort'
      - deny: 'nlx pnpm add axios'
      - deny: 'nlx npm@10 install axios'
      - deny: 'nlx pnpm@8 why eslint-plugin-simple-import-sort'

  # Direct node_modules/.bin/<tool> invocation bypasses the ni-family
  # indirection. Same intent as `nlx <tool>` / `npx <tool>`, which are also
  # denied above. Two rules (with/without `./` prefix) because runok pattern
  # alternation does not span path separators; YAML anchor shares the message
  # so the two stay in lockstep.
  - deny: 'node_modules/.bin/* *'
    message: &nmbin_msg 'BLOCKED: Use /ni skill. Direct node_modules/.bin invocation bypasses nr / nlx.'
    fix_suggestion: &nmbin_fix 'nr <script> / nlx <pkg>'
    tests:
      - deny: 'node_modules/.bin/vitest run tests/foo.test.ts'
      - deny: 'node_modules/.bin/tsc --showConfig'
      - deny: 'node_modules/.bin/tsc -p tsconfig.build.json --showConfig'
  - deny: './node_modules/.bin/* *'
    message: *nmbin_msg
    fix_suggestion: *nmbin_fix
    tests:
      - deny: './node_modules/.bin/tsc --showConfig'

  # `na <subcmd>` (@antfu/ni agent passthrough). Mirror PM-direct denies
  # so `na` can't be used to bypass the install / run / exec / dlx / config
  # set restrictions.
  - deny: 'na install|add|remove|update|run|exec|dlx *'
    message: 'BLOCKED: Use /ni skill. Use ni / nci / nun / nup / nr / nlx.'
    fix_suggestion: 'ni / nci / nun / nup / nr / nlx'
    tests:
      - deny: 'na install'
      - deny: 'na add axios'
      - deny: 'na remove lodash'
      - deny: 'na update'
      - deny: 'na run build'
      - deny: 'na exec eslint .'
      - deny: 'na dlx eslint --fix .'
  - deny: 'na config set *'
    message: 'BLOCKED: package manager config edits (.npmrc / .yarnrc / bunfig.toml) should be reviewed manually.'
    tests:
      - deny: 'na config set verify-deps-before-run never --location=project'
  # na is a literal passthrough to the detected PM (na <args> = <pm> <args>),
  # so prefixing na with the pm name itself is always a redundant/broken
  # invocation (e.g. resolves to `pnpm pnpm peers check`, which pnpm has no
  # such subcommand for).
  - deny: 'na pnpm|npm|yarn|bun *'
    message: 'na already passes through to the detected package manager; drop the redundant pm name.'
    fix_suggestion: 'na <args> (e.g. na peers check / na view <pkg>)'
    tests:
      - deny: 'na pnpm peers check'
      - deny: 'na npm view @fohte/eslint-config@0.3.6 --json'
      - deny: 'na yarn add axios'
      - deny: 'na bun install'
  # `na install|add|remove|update|run|exec|dlx *` above only catches `run`
  # when it's the first positional token. `-C`/`--filter` are order-
  # independent flags, so `na --filter web run test` slips past it. Same
  # operation as `nr [-C|--filter *] <script>` above, just via na.
  # -C|--filter is required (not optional) so bare `na run <script>` still
  # falls through to the broader deny above instead of this rule silently
  # overriding its message.
  - deny: 'na -C|--filter * run *'
    message: 'Use nr'
    fix_suggestion: 'nr <script> (use -C or --filter <workspace> to scope)'
    tests:
      - deny: 'na --filter web run test'
      - deny: 'na --filter web run build'
      - deny: 'na -C packages/web run test'

  # Read-only subcommands routed through na.
  - allow: 'na view|info|ls|list|outdated|audit|why|search|help *'
    tests:
      - allow: 'na view tsx version'
      - allow: 'na info hono'
      - allow: 'na ls'
      - allow: 'na outdated'
  - allow: 'na whoami'
  - allow: 'na -v|--version'
    tests:
      - allow: 'na -v'
      - allow: 'na --version'
  - allow: 'na config get *'
    tests:
      - allow: 'na config get registry'
  - allow: 'na config ls [-l|-s|--long|--json]'
    tests:
      - allow: 'na config ls'
      - allow: 'na config ls --json'
  - allow: 'na pm ls|outdated *'
    tests:
      - allow: 'na pm ls'
      - allow: 'na pm outdated'
  # pnpm 11.0+ read-only diagnostic; reports unmet peer deps by reading the
  # lockfile only (https://pnpm.io/cli/peers). No documented flags.
  - allow: 'na peers check'
    tests:
      - allow: 'na peers check'
  # Removes only unreferenced packages from the global content-addressable
  # store; never touches project files. pnpm docs:
  # "Running pnpm store prune is not harmful and has no side effects on
  # your projects" (https://pnpm.io/cli/store).
  - allow: 'na store prune'
    tests:
      - allow: 'na store prune'
  # `nr tsr generate` / `nlx tsr generate` are already allowed above; na is
  # the same single-file codegen via a third entry point.
  - allow: 'na tsr generate'
    tests:
      - allow: 'na tsr generate'
  # Resolves existing semver-range duplicates in the lockfile; no
  # package.json changes. https://pnpm.io/cli/dedupe
  - allow: 'na dedupe'
    tests:
      - allow: 'na dedupe'

  - allow: 'node *'
    sandbox: readonly
    tests:
      - allow: 'node -e "console.log(1)"'

  - allow: 'corepack enable'
    tests:
      - allow: 'corepack enable'

  - allow: 'corepack -v|--version'
    tests:
      - allow: 'corepack --version'
      - allow: 'corepack -v'
