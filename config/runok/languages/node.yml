# yaml-language-server: $schema=https://raw.githubusercontent.com/fohte/runok/main/schema/runok.schema.json

definitions:
  aliases:
    # corepack ships a pnpm shim; alias keeps pnpm rules in sync with it.
    pnpm:
      - pnpm
      - corepack pnpm

rules:
  # install (use ni)
  - allow: 'ni [--frozen-lockfile|--frozen|--no-frozen-lockfile|--frozen=false|--frozen=true|--frozen-lockfile=false|--frozen-lockfile=true] [--lockfile-only]'
    tests:
      - allow: 'ni'
      - allow: 'ni --frozen-lockfile'
      - allow: 'ni --lockfile-only'
      - allow: 'ni --frozen'
      - allow: 'ni --no-frozen-lockfile'
      - allow: 'ni --frozen=false'
      - allow: 'ni --frozen-lockfile=false'
      - allow: 'ni --frozen=false --lockfile-only'

  # clean install (use nci)
  - allow: 'nci [--frozen-lockfile|--no-frozen-lockfile|--frozen-lockfile=false|--frozen-lockfile=true|--lockfile-only]'
    tests:
      - allow: 'nci'
      - allow: 'nci --no-frozen-lockfile'
      - allow: 'nci --lockfile-only'

  # uninstall (use nun)
  - allow: 'nun *'
    tests:
      - allow: 'nun lodash'
      - allow: 'nun node-pg-migrate pg @types/pg'
  - deny: 'nun -g|--global *'
    message: 'BLOCKED: Global uninstall is not allowed via nun. Drop -g/--global.'
    tests:
      - deny: 'nun -g typescript'
      - deny: 'nun --global typescript'

  # enforce ni -E (exact pinning) in fohte's repos
  - allow: 'ni -E *'
    when: "env.PWD.startsWith(env.HOME + '/ghq/github.com/fohte/')"
  - deny: 'ni !-E *'
    when: "env.PWD.startsWith(env.HOME + '/ghq/github.com/fohte/') && size(args) > 0"
    message: 'BLOCKED: Use ni -E to pin exact versions in fohte repos.'
    fix_suggestion: 'ni -E <pkg>'

  # run scripts (use nr)
  - allow: 'nr [-C|--filter *] build|build:*|build-* *'
  - allow: 'nr [-C|--filter *] format|format:* *'
  - allow: 'nr [-C|--filter *] lint|lint:* *'
  - allow: 'nr [-C|--filter *] vitest|test|test:*|typecheck *'
    tests:
      - allow: 'nr test'
      - allow: 'nr test:type'
  - allow: 'nr [-C|--filter *] storybook|storybook:* *'
    tests:
      - allow: 'nr storybook'
      - allow: 'nr storybook:build'
  - allow: 'nr [-C|--filter *] generate|generate:* *'
    tests:
      - allow: 'nr generate'
      - allow: 'nr generate:api'
  - allow: 'nr tsr generate'
    tests:
      - allow: 'nr tsr generate'
  # DB migration file generation (drizzle-kit / prisma migrate diff).
  # Narrower than db:* — db:migrate / db:push apply to the actual DB.
  - allow: 'nr db:generate'
    tests:
      - allow: 'nr db:generate'
  - deny: 'nlx tsc *'
    message: 'Use nr'
  - deny: 'nlx vitest run *'
    message: 'Use nr'
  - deny: 'nlx eslint *'
    message: 'Use nr'
  # prettier is a safe formatter/checker; no nr indirection needed.
  # `prettier@*` also matches version-pinned runs (e.g. prettier@3.8.3).
  - allow: 'nlx prettier|prettier@* *'
    tests:
      - allow: 'nlx prettier --check config/karabiner/karabiner.json'
      - allow: 'nlx prettier --write src/index.ts'
      - allow: 'nlx prettier@3.8.3 --check check.json'
  # TanStack Router code generation only writes route files in the project.
  # Other tsr subcommands are not vetted yet.
  - allow: 'nlx tsr generate'
    tests:
      - allow: 'nlx tsr generate'

  # Force ni-family shortcuts (ni / nci / nun / nup / nr / nlx). Escape
  # hatch for non-write subcommands: `na <args>` (allowed below).
  # pnpm is a separate rule because the `pnpm` alias (pnpm | corepack pnpm)
  # does not expand inside pattern alternation.
  - deny: 'pnpm *'
    message: 'BLOCKED: Use /ni skill.'
    fix_suggestion: 'ni / nr / nlx / na <args>'
    tests:
      - deny: 'pnpm install'
      - deny: 'pnpm add axios'
      - deny: 'pnpm build'
      - deny: 'pnpm vitest run src/plugins/llm-agent'
      - deny: 'pnpm typecheck'
      - deny: 'pnpm tsc --noEmit'
      - deny: 'pnpm test --run'
      - deny: 'pnpm test:unit -- src/plugins/llm-agent/response-handler.test.ts'
      - deny: 'pnpm generate:api'
      - deny: 'pnpm format:prettier src/lib/api/schema.gen.d.ts'
      - deny: 'pnpm run build'
      - deny: 'pnpm remove lodash'
      - deny: 'pnpm dlx eslint --fix .'
      - deny: 'pnpm update'
      - deny: 'pnpm config set verify-deps-before-run never --location=project'
      - deny: 'corepack pnpm install --frozen-lockfile'
      - deny: 'corepack pnpm config set verify-deps-before-run never --location=project'

  - deny: 'npm|bun|yarn *'
    message: 'BLOCKED: Use /ni skill.'
    fix_suggestion: 'ni / nr / nlx / na <args>'
    tests:
      - deny: 'npm install axios'
      - deny: 'npm install -D typescript'
      - deny: 'npm run build'
      - deny: 'npm ci'
      - deny: 'npm uninstall lodash'
      - deny: 'npm update'
      - deny: 'yarn add axios'
      - deny: 'yarn install'
      - deny: 'yarn run build'
      - deny: 'yarn remove lodash'
      - deny: 'yarn dlx eslint --fix .'
      - deny: 'bun install'
      - deny: 'bun add axios'
      - deny: 'bun run build'
      - deny: 'bun remove lodash'
      - deny: 'bun update'

  - deny: 'npx|bunx *'
    message: 'BLOCKED: Use /ni skill. Use nlx.'
    fix_suggestion: 'nlx <pkg>'
    tests:
      - deny: 'npx eslint --fix .'
      - deny: 'bunx eslint --fix .'

  # `na <subcmd>` (@antfu/ni agent passthrough). Mirror PM-direct denies
  # so `na` can't be used to bypass the install / run / exec / dlx / config
  # set restrictions.
  - deny: 'na install|add|remove|update|run|exec|dlx *'
    message: 'BLOCKED: Use /ni skill. Use ni / nci / nun / nup / nr / nlx.'
    fix_suggestion: 'ni / nci / nun / nup / nr / nlx'
    tests:
      - deny: 'na install'
      - deny: 'na add axios'
      - deny: 'na remove lodash'
      - deny: 'na update'
      - deny: 'na run build'
      - deny: 'na exec eslint .'
      - deny: 'na dlx eslint --fix .'
  - deny: 'na config set *'
    message: 'BLOCKED: PM config edits (.npmrc / .yarnrc / bunfig.toml) should be reviewed manually.'
    tests:
      - deny: 'na config set verify-deps-before-run never --location=project'

  # Read-only subcommands routed through na.
  - allow: 'na view|info|ls|list|outdated|audit|why|search|help *'
    tests:
      - allow: 'na view tsx version'
      - allow: 'na info hono'
      - allow: 'na ls'
      - allow: 'na outdated'
  - allow: 'na whoami'
  - allow: 'na -v|--version'
    tests:
      - allow: 'na -v'
      - allow: 'na --version'
  - allow: 'na config get *'
    tests:
      - allow: 'na config get registry'
  - allow: 'na config ls [-l|-s|--long|--json]'
    tests:
      - allow: 'na config ls'
      - allow: 'na config ls --json'
  - allow: 'na pm ls|outdated *'
    tests:
      - allow: 'na pm ls'
      - allow: 'na pm outdated'

  - allow: 'node *'
    sandbox: readonly
    tests:
      - allow: 'node -e "console.log(1)"'

  - allow: 'corepack enable'
    tests:
      - allow: 'corepack enable'

  - allow: 'corepack -v|--version'
    tests:
      - allow: 'corepack --version'
      - allow: 'corepack -v'
