# yaml-language-server: $schema=https://raw.githubusercontent.com/fohte/runok/main/schema/runok.schema.json

rules:
  # install (use ni)
  - allow: 'ni'
    tests:
      - allow: 'ni'
      - ask: 'ni -D typescript'

  # enforce ni -E (exact pinning) in fohte's repos
  - allow: 'ni -E *'
    when: "env.PWD.startsWith('/Users/fohte/ghq/github.com/fohte/')"
  - deny: 'ni !-E *'
    when: "env.PWD.startsWith('/Users/fohte/ghq/github.com/fohte/') && size(args) > 0"
    message: 'BLOCKED: Use ni -E to pin exact versions in fohte repos.'
    fix_suggestion: 'ni -E <pkg>'

  - deny: 'npm install *'
    message: 'BLOCKED: Use /ni skill. Run: ni <pkg>'
    fix_suggestion: 'ni'
    tests:
      - deny: 'npm install axios'
      - deny: 'npm install -D typescript'
  - deny: 'yarn add *'
    message: 'BLOCKED: Use /ni skill. Run: ni <pkg>'
    fix_suggestion: 'ni <pkg>'
    tests:
      - deny: 'yarn add axios'
  - deny: 'yarn install *'
    message: 'BLOCKED: Use /ni skill. Run: ni'
    fix_suggestion: 'ni'
    tests:
      - deny: 'yarn install'
  - deny: 'pnpm install *'
    message: 'BLOCKED: Use /ni skill. Run: ni'
    fix_suggestion: 'ni'
    tests:
      - deny: 'pnpm install'
  - deny: 'pnpm add *'
    message: 'BLOCKED: Use /ni skill. Run: ni <pkg>'
    fix_suggestion: 'ni <pkg>'
    tests:
      - deny: 'pnpm add axios'
  - deny: 'bun install *'
    message: 'BLOCKED: Use /ni skill. Run: ni'
    fix_suggestion: 'ni'
    tests:
      - deny: 'bun install'
  - deny: 'bun add *'
    message: 'BLOCKED: Use /ni skill. Run: ni <pkg>'
    fix_suggestion: 'ni <pkg>'
    tests:
      - deny: 'bun add axios'

  # run scripts (use nr)
  - allow: 'nr build *'
  - allow: 'nr format *'
  - allow: 'nr lint *'
  - allow: 'nr test|test:* *'
    tests:
      - allow: 'nr test'
      - allow: 'nr test:type'

  - deny: 'npm run *'
    message: 'BLOCKED: Use /ni skill. Run: nr <script>'
    fix_suggestion: 'nr <script>'
    tests:
      - deny: 'npm run build'
      - deny: 'npm run test'
  - deny: 'yarn run *'
    message: 'BLOCKED: Use /ni skill. Run: nr <script>'
    fix_suggestion: 'nr <script>'
    tests:
      - deny: 'yarn run build'
  - deny: 'pnpm run *'
    message: 'BLOCKED: Use /ni skill. Run: nr <script>'
    fix_suggestion: 'nr <script>'
    tests:
      - deny: 'pnpm run build'
  - deny: 'bun run *'
    message: 'BLOCKED: Use /ni skill. Run: nr <script>'
    fix_suggestion: 'nr <script>'
    tests:
      - deny: 'bun run build'

  # execute packages (prefer nr <script> over nlx)
  - deny: 'npx *'
    message: 'BLOCKED: Use /ni skill. Prefer nr <script> if a matching script exists in package.json. Only use nlx if no matching script exists.'
    fix_suggestion: 'nr <script> or nlx <pkg>'
    tests:
      - deny: 'npx eslint --fix .'
  - deny: 'yarn dlx *'
    message: 'BLOCKED: Use /ni skill. Prefer nr <script> if a matching script exists in package.json. Only use nlx if no matching script exists.'
    fix_suggestion: 'nr <script> or nlx <pkg>'
    tests:
      - deny: 'yarn dlx eslint --fix .'
  - deny: 'pnpm dlx *'
    message: 'BLOCKED: Use /ni skill. Prefer nr <script> if a matching script exists in package.json. Only use nlx if no matching script exists.'
    fix_suggestion: 'nr <script> or nlx <pkg>'
    tests:
      - deny: 'pnpm dlx eslint --fix .'
  - deny: 'bunx *'
    message: 'BLOCKED: Use /ni skill. Prefer nr <script> if a matching script exists in package.json. Only use nlx if no matching script exists.'
    fix_suggestion: 'nr <script> or nlx <pkg>'
    tests:
      - deny: 'bunx eslint --fix .'

  # clean install (use nci)
  - deny: 'npm ci *'
    message: 'BLOCKED: Use /ni skill. Run: nci'
    fix_suggestion: 'nci'
    tests:
      - deny: 'npm ci'

  # uninstall (use nun)
  - deny: 'npm uninstall *'
    message: 'BLOCKED: Use /ni skill. Run: nun <pkg>'
    fix_suggestion: 'nun <pkg>'
    tests:
      - deny: 'npm uninstall lodash'
  - deny: 'yarn remove *'
    message: 'BLOCKED: Use /ni skill. Run: nun <pkg>'
    fix_suggestion: 'nun <pkg>'
    tests:
      - deny: 'yarn remove lodash'
  - deny: 'pnpm remove *'
    message: 'BLOCKED: Use /ni skill. Run: nun <pkg>'
    fix_suggestion: 'nun <pkg>'
    tests:
      - deny: 'pnpm remove lodash'
  - deny: 'bun remove *'
    message: 'BLOCKED: Use /ni skill. Run: nun <pkg>'
    fix_suggestion: 'nun <pkg>'
    tests:
      - deny: 'bun remove lodash'

  # update (use nu)
  - deny: 'npm update *'
    message: 'BLOCKED: Use /ni skill. Run: nu'
    fix_suggestion: 'nu'
    tests:
      - deny: 'npm update'
  - deny: 'pnpm update *'
    message: 'BLOCKED: Use /ni skill. Run: nu'
    fix_suggestion: 'nu'
    tests:
      - deny: 'pnpm update'
  - deny: 'bun update *'
    message: 'BLOCKED: Use /ni skill. Run: nu'
    fix_suggestion: 'nu'
    tests:
      - deny: 'bun update'

  # read-only commands (no ni equivalent)
  - allow: 'npm view *'
  - allow: 'npm info *'
  - allow: 'npm ls *'
  - allow: 'npm outdated *'
  - allow: 'npm audit *'
  - allow: 'npm search *'
  - allow: 'yarn info *'
  - allow: 'yarn why *'
  - allow: 'yarn audit *'
  - allow: 'pnpm ls *'
  - allow: 'pnpm outdated *'
  - allow: 'pnpm audit *'
  - allow: 'pnpm why *'
  - allow: 'bun pm ls *'
  - allow: 'bun pm outdated *'

  - allow: 'node *'
    sandbox: readonly
    tests:
      - allow: 'node -e "console.log(1)"'
