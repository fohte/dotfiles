# yaml-language-server: $schema=https://raw.githubusercontent.com/fohte/runok/main/schema/runok.schema.json

rules:
  - allow: 'bundle show *'
  - allow: 'bundle info *'
  - allow: 'bundle list *'
  - allow: 'bundle env'
  - allow: 'bundle config'
  - allow: 'bundle config get *'
  - allow: 'bundle config list'
  - allow: 'ruby *'
    sandbox: readonly
  - allow: 'ruby -c *'
    tests:
      - allow: 'ruby -c script.rb'
  - allow: 'bundle install *'
  - allow: 'bundle exec rspec *'
  - allow: 'bundle exec rubocop *'
