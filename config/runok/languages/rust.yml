# yaml-language-server: $schema=https://raw.githubusercontent.com/fohte/runok/main/schema/runok.schema.json

rules:
  - allow: 'cargo build *'
    tests:
      - allow: 'cargo build --release'
  - allow: 'cargo check *'
  - allow: 'cargo clean *'
    tests:
      - allow: 'cargo clean'
      - allow: 'cargo clean -p armyknife'
  - allow: 'cargo clippy *'
  - allow: 'cargo doc *'
  - allow: 'cargo fmt *'
  - allow: 'cargo llvm-cov *'
  - allow: 'cargo metadata *'
  - allow: 'cargo new *'
    tests:
      - allow: 'cargo new --bin tree-check'
  # `cargo run` can execute arbitrary host code via build.rs / proc-macros /
  # --manifest-path / --example, so this broad allow is gated by cwd.
  - allow: 'cargo run *'
    when: 'env.PWD.startsWith(env.HOME + "/ghq/github.com/fohte/")'
    tests:
      - allow: 'cargo run'
      - allow: 'cargo run --quiet -- --dump-openapi'
      - allow: 'cargo run -q -- --dump-openapi'
      - allow: 'cargo run -- generate trigger'
      - allow: 'cargo run -- up'
      - allow: 'cargo run --bin backend --quiet -- --dump-openapi'
      - allow: 'cargo run --manifest-path backend/Cargo.toml -p backend -- --migrate-only'
  - allow: 'cargo search *'
  - allow: 'cargo test *'
    tests:
      - allow: 'cargo test'
      - allow: 'cargo test --lib'
  - allow: 'cargo tree *'
  - allow: 'cargo update *'
    tests:
      - allow: 'cargo update --workspace --offline'
      - allow: 'cargo update -p armyknife --offline'

  - allow: 'rustup show *'
    tests:
      - allow: 'rustup show'
      - allow: 'rustup show active-toolchain'
      - allow: 'rustup show home'
