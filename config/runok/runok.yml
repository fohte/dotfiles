# yaml-language-server: $schema=https://raw.githubusercontent.com/fohte/runok/main/schema/runok.schema.json

extends:
  - 'github:fohte/runok-presets/base'
  - './common.yml'
  - './git.yml'
  - './languages/rust.yml'
  - './languages/go.yml'
  - './languages/node.yml'
  - './languages/ruby.yml'
  - './languages/python.yml'
  - './languages/jsonnet.yml'
  - './tools/aws.yml'
  - './tools/docker.yml'
  - './tools/gcloud.yml'
  - './tools/linters.yml'
  - './tools/terraform.yml'
  - './tools/misc.yml'

defaults:
  action: ask

definitions:
  paths:
    sensitive:
      - '.env'
      - '.env.*'
      - '.envrc'
      - '~/.ssh/**'
      - '~/.gnupg/**'
      - '~/.aws/credentials'
      - '~/.config/gh/hosts.yml'

  sandbox:
    readonly:
      fs:
        write:
          allow: []
          deny:
            - '<path:sensitive>'
      network:
        allow: false

  wrappers:
    - 'mise x|exec -- <cmd>'
