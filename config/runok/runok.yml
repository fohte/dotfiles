# yaml-language-server: $schema=https://raw.githubusercontent.com/fohte/runok/main/schema/runok.schema.json

extends:
  - 'github:fohte/runok-presets/base'
  - './common.yml'
  - './trusted-repos.yml'
  - './git.yml'
  - './macos.yml'
  - './opensrc.yml'
  - './languages/rust.yml'
  - './languages/go.yml'
  - './languages/node.yml'
  - './languages/ruby.yml'
  - './languages/python.yml'
  - './languages/jsonnet.yml'
  - './languages/perl.yml'
  - './tools/argocd.yml'
  - './tools/aws.yml'
  - './tools/colima.yml'
  - './tools/docker.yml'
  - './tools/gcloud.yml'
  - './tools/k8s.yml'
  - './tools/linters.yml'
  - './tools/obsidian.yml'
  - './tools/srt.yml'
  - './tools/terraform.yml'
  - './tools/misc.yml'
  - './work.yml'

defaults:
  action: ask

definitions:
  paths:
    sensitive:
      - '.env'
      - '.env.*'
      - '.envrc'
      - '~/.ssh/**'
      - '~/.gnupg/**'
      - '~/.aws/credentials'
      - '~/.config/gh/hosts.yml'

  sandbox:
    readonly:
      fs:
        write:
          allow: []
          deny:
            - '<path:sensitive>'
      network:
        allow: false

    # For interpreters whose in-place edit mode (e.g. `perl -i`) needs real
    # writes, unlike `readonly` above. Writes are confined to the project
    # tree (excluding `.git`), so damage stays recoverable via git, and
    # network is blocked. Only `<path:sensitive>` is read-denied -- runok's
    # fs.read only supports deny-listing, not scoping reads to cwd, so other
    # paths on disk (e.g. ~/.aws/config, ~/.npmrc) remain readable.
    write-cwd:
      fs:
        read:
          deny:
            - '<path:sensitive>'
        write:
          allow:
            - '.'
          deny:
            - '.git'
            - '<path:sensitive>'
      network:
        allow: false

  wrappers:
    # `*` consumes 0+ TOOL@VERSION args so both `mise x -- <cmd>` and
    # `mise x jq node@20 -- <cmd>` route through the wrapper.
    - 'mise x|exec * -- <cmd>'
    - 'rtk proxy <cmd>'

rules:
  # `rtk <cmd>` strips boilerplate from the inner command's stdout. Any other
  # rtk subcommand should go through `rtk proxy <cmd>`, which is registered
  # as a wrapper above so the inner command is evaluated against normal rules.
  - deny: 'rtk !proxy *'
    message: 'Bare `rtk <cmd>` truncates output. Use `rtk proxy <cmd>` so the inner command is evaluated by runok rules.'
    fix_suggestion: 'rtk proxy <cmd>'
    tests:
      - deny: 'rtk git diff'
      - deny: 'rtk ls /tmp'

  # Absolute-path invocation makes existing rule patterns (e.g. `rg *`) miss
  # and skips PATH-based wrappers. Call the command by its bare name; if
  # output truncation is a real problem, wrap it with `rtk proxy <cmd>`.
  - deny: '/* *'
    message: 'Call the command by its bare name (e.g. `rg`), not by absolute path. If you actually need raw output, use `rtk proxy <cmd>`.'
    tests:
      - deny: '/opt/homebrew/bin/rg foo'
      - deny: '/usr/bin/ls'
      - deny: '/bin/sh -c "echo hi"'

tests:
  cases:
    - allow: 'mise x -- ls /tmp'
    - allow: 'mise exec -- ls /tmp'
    - allow: 'mise x jq -- ls /tmp'
    - allow: 'mise exec jq -- ls /tmp'
    - allow: 'mise x node@20 -- ls /tmp'
    - allow: 'mise x node@20 python@3.11 -- ls /tmp'
    - allow: 'rtk proxy ls /tmp'
    - allow: 'rtk proxy git status'
