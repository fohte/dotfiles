# yaml-language-server: $schema=https://raw.githubusercontent.com/fohte/runok/main/schema/runok.schema.json

extends:
  - 'github:fohte/runok-presets/base'
  - './common.yml'
  - './git.yml'
  - './macos.yml'
  - './languages/rust.yml'
  - './languages/go.yml'
  - './languages/node.yml'
  - './languages/ruby.yml'
  - './languages/python.yml'
  - './languages/jsonnet.yml'
  - './tools/aws.yml'
  - './tools/docker.yml'
  - './tools/gcloud.yml'
  - './tools/k8s.yml'
  - './tools/linters.yml'
  - './tools/obsidian.yml'
  - './tools/terraform.yml'
  - './tools/misc.yml'

defaults:
  action: ask

definitions:
  paths:
    sensitive:
      - '.env'
      - '.env.*'
      - '.envrc'
      - '~/.ssh/**'
      - '~/.gnupg/**'
      - '~/.aws/credentials'
      - '~/.config/gh/hosts.yml'

  sandbox:
    readonly:
      fs:
        write:
          allow: []
          deny:
            - '<path:sensitive>'
      network:
        allow: false

  wrappers:
    # `*` consumes 0+ TOOL@VERSION args so both `mise x -- <cmd>` and
    # `mise x jq node@20 -- <cmd>` route through the wrapper.
    - 'mise x|exec * -- <cmd>'

tests:
  cases:
    # Existing form: `mise x -- <cmd>` with no TOOL@VERSION args.
    - allow: 'mise x -- ls /tmp'
    - allow: 'mise exec -- ls /tmp'
    # New form: `mise x TOOL@VERSION... -- <cmd>` with tool args before `--`.
    - allow: 'mise x jq -- ls /tmp'
    - allow: 'mise exec jq -- ls /tmp'
    - allow: 'mise x node@20 -- ls /tmp'
    - allow: 'mise x node@20 python@3.11 -- ls /tmp'
