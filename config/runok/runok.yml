# yaml-language-server: $schema=https://raw.githubusercontent.com/fohte/runok/main/schema/runok.schema.json

defaults:
  action: ask

rules:
  # === deny rules ===
  - deny: 'gh [-R *] api * --paginate *'
    message: 'Blocked to prevent excessive API rate limit consumption'
  - deny: 'gh repo set-default *'
    message: 'Blocked to prevent unintended operations on wrong repository'
  - deny: 'git [-C *] commit --amend *'
    message: 'Blocked to prevent rewriting previous commit which may destroy work'
    fix_suggestion: 'git commit -m "fix: ..."'
  - deny: 'git [-C *] commit --no-gpg-sign *'
    message: 'Blocked to ensure commits are always GPG signed'
    fix_suggestion: 'git commit -m "..."'
  - deny: 'git [-C *] commit -n|--no-verify *'
    message: 'Blocked to ensure pre-commit hooks always run'
    fix_suggestion: 'git commit -m "..."'
  - deny: 'git [-C *] push --force-with-lease *'
    message: 'Blocked to prevent rewriting remote history'
  - deny: 'git [-C *] push --force *'
    message: 'Blocked to prevent rewriting remote history'
    fix_suggestion: 'git push'
  - deny: 'git [-C *] push -f *'
    message: 'Blocked to prevent rewriting remote history'
    fix_suggestion: 'git push'
  - deny: 'rm -rf *'
    message: 'Blocked because recursive forced deletion is irreversible'
    fix_suggestion: 'rm -r'

  # === allow rules ===

  # generic flags
  - allow: '* --help'
  - allow: '* --version'

  # shell builtins
  - allow: ': *'
  - allow: '[ *'
  - allow: 'basename *'
  - allow: 'cd *'
  - allow: 'cp *'
  - allow: 'dirname *'
  - allow: 'echo *'
  - allow: 'false'
  - allow: 'file *'
  - allow: 'id *'
  - allow: 'mv *'
  - allow: 'printf *'
  - allow: 'pwd'
  - allow: 'read *'
  - allow: 'readlink *'
  - allow: 'realpath *'
  - allow: 'sleep *'
  - allow: 'strings'
  - allow: 'test *'
  - allow: 'true'
  - allow: 'type *'
  - allow: 'uname *'
  - allow: 'which *'
  - allow: 'whoami'

  # common commands
  - allow: 'cat *'
  - allow: 'col *'
  - allow: 'ps *'
  - allow: 'cut *'
  - allow: 'diff *'
  - allow: 'du *'
  - allow: 'head *'
  - allow: 'less *'
  - allow: 'ls *'
  - allow: 'md5sum *'
  - allow: 'sha256sum *'
  - allow: 'shasum *'
  - allow: 'sort *'
  - allow: 'stat *'
  - allow: 'tail *'
  - allow: 'tr *'
  - allow: 'tree *'
  - allow: 'uniq *'
  - allow: 'wc *'
  # xargs with no args just trims stdin whitespace (runs /bin/echo by default).
  # The wrapper definition `xargs <cmd>` only matches when args are present.
  - allow: 'xargs'
  - allow: 'xxd *'
  - allow: 'find *'
  - allow: 'chmod +x *'
  - allow: 'mkdir *'
  - allow: 'touch *'
  - allow: 'awk *'
    sandbox: readonly
  - allow: 'sed|gsed *'
  - allow: 'grep *'
  - allow: 'rg *'
  - allow: 'curl [-s] [-X GET] *'
  - allow: 'date *'
  - allow: 'jq *'
  - allow: 'yq *'
  - allow: 'bats *'
  - allow: 'base64 *'
  - allow: 'dig *'
  - allow: 'ps *'
  - allow: 'top *'
  - allow: 'lsof *'
  - allow: 'pgrep *'
  - allow: 'strings *'
  - allow: 'bc *'
  - allow: 'comm *'
  - allow: 'paste *'
  - allow: 'man *'
  - allow: 'mktemp *'

  # armyknife
  - allow: 'a ai draft *'
  - allow: 'a ai pr-draft *'
  - allow: 'a ai review wait *'
  - allow: 'a gh check-pr-review *'
  - allow: 'a gh issue-agent diff *'
  - allow: 'a gh issue-agent init *'
  - allow: 'a gh issue-agent pull *'
  - allow: 'a gh issue-agent view *'

  # linters and formatters
  - allow: 'actionlint *'
  - allow: 'bash -n *'
  - allow: 'shellcheck *'
  - allow: 'shfmt *'
  - allow: 'prettier *'
  - allow: 'xmllint *'

  # package managers
  - allow: 'bun pm ls *'
  - allow: 'ni'
  - allow: 'npm view *'
  - allow: 'npm info *'
  - allow: 'nr build *'
  - allow: 'nr format *'
  - allow: 'nr lint *'
  - allow: 'nr test *'

  # cargo / rust
  - allow: 'cargo build *'
  - allow: 'cargo check *'
  - allow: 'cargo clippy *'
  - allow: 'cargo doc *'
  - allow: 'cargo fmt *'
  - allow: 'cargo llvm-cov *'
  - allow: 'cargo metadata *'
  - allow: 'cargo search *'
  - allow: 'cargo test *'
  - allow: 'cargo tree *'

  - allow: 'go doc *'
  - allow: 'go env *'

  - allow: 'bundle show *'
  - allow: 'bundle info *'

  # Claude Code
  - allow: 'claude-session-digest *'
  - allow: 'gen-claude-template *'

  # gcloud (readonly)
  - allow: 'gcloud * describe *'
  - allow: 'gcloud * list *'

  # gh
  - allow: 'gh [-R *] * list *'
  - allow: 'gh [-R *] * view *'
  - allow: 'gh [-R *] api -X GET *'
  - allow: 'gh [-R *] browse *'
  - allow: 'gh [-R *] pr checks *'
  - allow: 'gh [-R *] pr diff *'
  - allow: 'gh [-R *] run watch *'
  - allow: 'gh [-R *] search *'
  - allow: 'gh [-R *] run download *'
  - deny: 'gh repo clone *'
    message: 'Use ghq'
  - deny: 'gh log *'
    message: 'Not a valid gh command, did you mean `gh run watch`?'
  - deny: 'gh [-R *] issue comment *'
    message: 'Use /github-issue skill'

  # aws
  - allow: 'aws * get-*|list-*|describe-* *'
  - deny: 'aws ssm get-* --with-decryption *'
    message: 'Blocked to prevent accidental exposure of sensitive parameters'
    fix_suggestion: 'aws ssm get-parameter --name <name> (no decryption)'
  - allow: 'aws cloudtrail lookup-events *'
  - allow: 'aws logs filter-log-events *'

  # ghq
  - allow: 'ghq get *'
  - allow: 'ghq list *'

  # git
  - allow: 'git [-C *] branch'
  - allow: 'git [-C *] branch [-a|--all] [-r|--remotes] [-v|--verbose] [--sort *] [-l|--list *]'
  - allow: 'git [-C *] branch --show-current'
  - allow: 'git [-C *] branch --contains|--merged|--no-merged *'
  - allow: 'git [-C *] tag'
  - allow: 'git [-C *] tag [-n *] [-l|--list] *'
  - allow: 'git [-C *] tag -v|--verify *'
  - allow: 'git [-C *] tag --contains|--merged|--no-merged *'
  - allow: 'git [-C *] add *'
  - allow: 'git [-C *] checkout -- *'
  - allow: 'git [-C *] commit *'
  - allow: 'git [-C *] commit -m *'
  - allow: 'git [-C *] diff *'
  - allow: 'git [-C *] fetch *'
  - allow: 'git [-C *] grep *'
  - allow: 'git [-C *] help *'
  - allow: 'git [-C *] log *'
  - allow: 'git [-C *] ls-tree *'
  - allow: 'git [-C *] ls-files *'
  - allow: 'git [-C *] merge origin/main|origin/master *'
  - deny: 'git [-C *] rebase origin/main|origin/master *'
    message: 'Blocked to prevent unintended rewriting of commit history'
    fix_suggestion: 'git merge origin/main or origin/master'
  - allow: 'git [-C *] mv *'
  - allow: 'git [-C *] pull *'
  - deny: 'git [-C *] pull --no-rebase'
    message: 'Blocked to prevent unintended merge commits'
    fix_suggestion: 'git pull --rebase'
  - allow: 'git [-C *] push *'
  - allow: 'git [-C *] remote get-url *'
  - allow: 'git [-C *] rev-parse *'
  - allow: 'git [-C *] show *'
  - allow: 'git [-C *] status *'
  - allow: 'git [-C *] merge-base *'
  - allow: 'git [-C *] describe *'

  # semgrep
  - allow: 'sg|ast-grep scan *'
  - allow: 'sg|ast-grep test *'

  # workflow tools
  - allow: 'lefthook run *'
  - allow: 'mise run test *'

  # terraform
  - allow: 'terraform fmt'
  - allow: 'terraform fmt *'
  - allow: 'terraform validate'

  # tmux (read-only)
  - allow: 'tmux capture-pane *'
  - allow: 'tmux display-message *'
  - allow: 'tmux list-buffers *'
  - allow: 'tmux list-clients *'
  - allow: 'tmux list-commands *'
  - allow: 'tmux list-keys *'
  - allow: 'tmux list-panes *'
  - allow: 'tmux list-sessions *'
  - allow: 'tmux list-windows *'
  - allow: 'tmux show-buffer *'
  - allow: 'tmux show-environment *'
  - allow: 'tmux show-hooks *'
  - allow: 'tmux show-messages *'
  - allow: 'tmux show-options *'
  - allow: 'tmux show-window-options *'

  - allow: 'runok check *'
  - allow: 'runok exec *'

  - allow: npx --package renovate -c 'renovate-config-validator renovate.json5'

  # interpreters (sandbox-only, read-only + no network)
  - allow: 'node *'
    sandbox: readonly
  - allow: 'python3 *'
    sandbox: readonly
  - allow: 'ruby *'
    sandbox: readonly
  - allow: 'ruby -c *' # typecheck
  - allow: 'jsonnet *'
    sandbox: readonly

  - allow: 'npx @marp-team/marp-cli@latest *'

definitions:
  paths:
    sensitive:
      - '.env'
      - '.env.*'
      - '.envrc'
      - '~/.ssh/**'
      - '~/.gnupg/**'
      - '~/.aws/credentials'
      - '~/.config/gh/hosts.yml'

  sandbox:
    default:
      fs:
        writable: [., /tmp]
        deny:
          - '<path:sensitive>'
      network:
        allow: true
    readonly:
      fs:
        writable: []
        deny:
          - '<path:sensitive>'
      network:
        allow: false

  wrappers:
    - 'sudo <cmd>'
    - 'bash -c <cmd>'
    - 'sh -c <cmd>'
    - 'xargs <cmd>'
    - 'mise x|exec -- <cmd>'
