# yaml-language-server: $schema=https://raw.githubusercontent.com/fohte/runok/main/schema/runok.schema.json

definitions:
  wrappers:
    # `colima ssh -- <cmd>` executes <cmd> inside the colima VM. Register as a
    # wrapper so the inner command is recursively evaluated against existing
    # rules (e.g. docker rules in tools/docker.yml). Bare `colima ssh` (no `--`)
    # opens an interactive shell and falls through to default ask.
    - 'colima ssh -- <cmd>'
    # `limactl shell colima -- <cmd>` is the underlying Lima command colima's
    # own `ssh` subcommand wraps -- same VM, same inner-command re-evaluation.
    # The instance name is pinned to the literal `colima` (not `<opts>`/`*`)
    # for the same reason the `docker` alias pins `--context colima`: other
    # flags (`--sync`, `--preserve-env`, ...) and other Lima instances aren't
    # covered by this VM's confirmed read-only `~/ghq` confinement.
    - 'limactl shell colima -- <cmd>'

rules:
  # Readonly Colima VM subcommands. start/stop/delete/restart/ssh are
  # destructive or interactive and fall through to default ask.
  - allow: 'colima status|list|version|template *'
    tests:
      - allow: 'colima status'
      - allow: 'colima list'
      - allow: 'colima version'
      - ask: 'colima start'
      - ask: 'colima stop'
      - ask: 'colima delete'
      - allow: 'colima ssh -- docker ps'
      - allow: 'colima ssh -- docker images postgres'
      # `docker run` is gated by trusted-repos.yml's cwd check, same as a
      # direct `docker run` outside colima ssh -- both end up running in
      # the same VM.
      - allow: 'colima ssh -- docker run -d --name pg postgres:17-alpine'
      - ask: 'colima ssh'
      - allow: 'limactl shell colima -- docker ps'
      - ask: 'limactl shell other-vm -- docker ps'
      - ask: 'limactl shell colima'
