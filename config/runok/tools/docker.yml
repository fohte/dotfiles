# yaml-language-server: $schema=https://raw.githubusercontent.com/fohte/runok/main/schema/runok.schema.json

definitions:
  aliases:
    # Colima installs docker.lima as a docker CLI shim.
    docker:
      - docker
      - docker.lima
    # docker-compose (v1 standalone binary) is a drop-in alias for `docker compose`.
    # `docker compose` expands recursively through the `docker` alias above,
    # so `docker.lima compose` does not need to be listed explicitly.
    docker-compose:
      - 'docker compose'
      - 'docker-compose'

rules:
  # docker
  # `docker exec` / `docker run` and their compose equivalents are
  # trust-gated; see trusted-repos.yml.
  - allow: docker inspect *
    tests:
      - allow: 'docker inspect foo'
      - allow: 'docker.lima inspect foo'
  - allow: docker logs *
  - allow: docker ps *
  - allow: docker images *
  - allow: docker stats *
  - allow: docker top *
  - allow: docker port *
  - allow: docker diff *
  - allow: docker history *
  - allow: docker version
  - allow: 'docker info *'
    tests:
      - allow: 'docker info'
      - allow: "docker info --format '{{.ServerVersion}}'"
  - allow: docker network ls|inspect *
  - allow: docker volume ls|inspect *
  - allow: docker context ls|inspect *
    tests:
      - allow: 'docker context ls'
      - allow: 'docker context inspect default'
  - allow: 'docker manifest inspect *'
    tests:
      - allow: 'docker manifest inspect node:24.17.0-slim'
      - ask: 'docker manifest push mymanifest'

  - allow: 'docker build *'
    tests:
      - allow: 'docker build -t my-image .'
      - allow: 'docker build -f Dockerfile.dev -t foo .'

  # Container lifecycle: start/stop only resume/pause an already-created
  # container (no new code execution, no data loss), so they're safe to allow
  # unscoped.
  - allow: 'docker start|stop *'
    tests:
      - allow: 'docker start meshi-postgres-test'
      - allow: 'docker start meshi-postgres meshi-obs-smoketest'
      - allow: 'docker stop meshi-postgres-test'
  # `rm` deletes containers, and a trailing `*` would otherwise swallow
  # multiple container names in one call (e.g. `docker rm -f $(docker ps
  # -aq)` removing everything at once), so it's bounded to one container per
  # invocation. Only `-f`/`--force` is allowed through; other flags such as
  # `-v`/`--volumes` also delete anonymous volumes and must stay ask.
  - allow: 'docker rm [-f] *'
    when: 'size(args) == 2 && !flags.exists(k, k != "f" && k != "force")'
    tests:
      - allow: 'docker rm -f meshi-obs-smoketest'
      - allow: 'docker rm meshi-obs-smoketest'
      - ask: 'docker rm -f meshi-obs-smoketest other-container'
      - ask: 'docker rm -v meshi-obs-smoketest'

  # Apple container CLI: validate Renovate config via the official image.
  # Used by the debug-renovate skill.
  - allow: 'container run --rm -v * -w * ghcr.io/renovatebot/renovate:* renovate-config-validator *'
    tests:
      - allow: 'container run --rm -v /repo:/repo -w /repo ghcr.io/renovatebot/renovate:latest renovate-config-validator --strict --no-global renovate.json5'

  # docker compose
  - allow: 'docker-compose [-f *] up|logs|ps|config|images|top|ls *'
    tests:
      - allow: 'docker compose up -d'
      - allow: 'docker compose -f docker-compose.infra.yml up -d'
      - allow: 'docker compose -f ../docker-compose.infra.yml ps'
      - allow: 'docker compose logs -f web'
      - allow: 'docker-compose up -d'
      - allow: 'docker.lima compose ps'

  - allow: 'docker-compose [-f *] port *'
    tests:
      - allow: 'docker compose port postgres 5432'
      - allow: 'docker compose port db 5432'
      - allow: 'docker compose port app 8080'
      - allow: 'docker-compose port web 80'

  - allow: 'docker-compose version'
    tests:
      - allow: 'docker compose version'
      - allow: 'docker-compose version'
      - ask: 'docker compose version --format json'

  # `--push` has no short-flag form (confirmed via `docker compose build
  # --help`), so a plain pattern negation can't be bypassed by a fused
  # short-flag cluster the way a `when` deny-list on `-v`/`down` can.
  - allow: 'docker-compose [-f *] build !--push *'
    tests:
      - allow: 'docker compose build app'
      - allow: 'docker-compose build app'
      - allow: 'docker compose build'
      - ask: 'docker compose build app --push'

  # `-v`/`--volumes` deletes named/anonymous volumes (data loss), so it's
  # denied outright rather than left as ask. `--rmi` only deletes
  # rebuildable images, so it's allowed unscoped below. The glob suffix
  # (`-v*`/`--volumes*`) catches fused short-flag clusters too: down's
  # only other short flag is `-t`/`--timeout` (value-taking), and pflag
  # shorthand clusters require the value-taking flag to be last, so any
  # real fusion of `-v` can only appear as `-vt<N>`/`-vt <N>` -- always
  # `-v`-prefixed. A cluster like `-tv5` isn't a real bypass: pflag reads
  # it as `-t` with value `"v5"` (invalid int), not `-v` + `-t`.
  - deny: 'docker-compose [-f *] down -v*|--volumes* *'
    message: '`docker compose down -v`/`--volumes` deletes named/anonymous volumes. Run it manually if data loss is intended.'
    tests:
      - deny: 'docker compose down -v'
      - deny: 'docker compose down --volumes'
      - deny: 'docker compose down app -v'
      - deny: 'docker compose down -vt5'
      - deny: 'docker compose down -vt 5'

  - allow: 'docker-compose [-f *] down *'
    tests:
      - allow: 'docker compose down'
      - allow: 'docker-compose down'
      - allow: 'docker compose -f docker-compose.yml down'
      - allow: 'docker compose down -t 5'
      - allow: 'docker compose down --rmi local'
      - allow: 'docker compose down --rmi all'
      - allow: 'docker compose down --remove-orphans'
      - allow: 'docker compose down --dry-run'
