# yaml-language-server: $schema=https://raw.githubusercontent.com/fohte/runok/main/schema/runok.schema.json

definitions:
  # Strip value-taking global flags from the leading tokens so each rule can
  # match on the bare command name. Optional groups let the alias match both
  # space- and `=`-joined flag forms without repeating the list. `--token`
  # and `--password` are intentionally omitted from kubectl so secret-bearing
  # invocations fall through to ask.
  aliases:
    kubectl:
      - 'kubectl [-n|--namespace *] [--context *] [--cluster *] [--user *] [--kubeconfig *]'
    talosctl:
      - 'talosctl [-n|--nodes *] [-e|--endpoints *] [-c|--cluster *] [--context *] [--talosconfig *] [--siderov1-keys-dir *]'

  flag_groups:
    # Capture every `--dry-run` value as a list so a `when` clause can assert
    # every occurrence is safe (kubectl uses last-wins for repeated flags).
    kubectl-apply-dry-run: '--dry-run *'

  vars:
    # Node paths that `talosctl read` can return without exposing
    # credentials. `/proc` holds kernel/process metadata only. Declared as
    # a pattern-typed var so the inner `*` keeps its glob semantics.
    talos-readable:
      type: pattern
      values:
        - '/proc/*'

rules:
  - allow: 'kubectl get|describe|logs *'
    tests:
      - allow: 'kubectl get pods'
      - allow: 'kubectl --context foo get pods'
      - allow: 'kubectl --context=foo get pods'
      - allow: 'kubectl --kubeconfig ~/.kube/work --context prod get pods -A'
      - allow: 'kubectl -n default --context foo describe pod bar'
  # `get secret` with no output flag prints only the NAME/TYPE/DATA/AGE table
  # (no values), so the broad `get` allow rule above covers it. `-o`/`--output`
  # dumps the base64 `data`; route those to ask wherever the flag sits relative
  # to the resource. Fused short flags parse to a flag name like `oyaml` (not
  # `o`), so the `when` clause matches the flag by key prefix to also catch
  # `-oyaml`/`-ojson`. kubectl spells the resource `secret`, `secrets`, or
  # `secret(s).v1[.]`, so glob every form.
  - ask: 'kubectl get * secret* *'
    when: "flags.exists(k, k.startsWith('o'))"
    tests:
      - allow: 'kubectl get secret'
      - allow: 'kubectl get secret foo'
      - allow: 'kubectl --context prod -n default get secrets'
      - allow: 'kubectl get pods -o yaml'
      - ask: 'kubectl get secret foo -o yaml'
      - ask: 'kubectl get secret foo -oyaml'
      - ask: 'kubectl get -o yaml secret foo'
      - ask: 'kubectl get --output json secret foo'
      - ask: 'kubectl -n databases get secret cnpg-main-backup-b2 -o jsonpath={.data.ACCESS_KEY_ID}'

  # Read-only info subcommands (no cluster mutation, no secret leakage).
  # `cluster-info dump` is excluded because it aggregates pod logs / ConfigMaps
  # that may contain secrets.
  - allow: 'kubectl version|api-resources|api-versions|explain *'
    tests:
      - allow: 'kubectl version'
      - allow: 'kubectl version --short'
      - allow: 'kubectl api-resources'
      - allow: 'kubectl api-versions'
      - allow: 'kubectl explain pod'
      - allow: 'kubectl --context foo api-resources'
  - allow: 'kubectl cluster-info'
    tests:
      - allow: 'kubectl cluster-info'
      - allow: 'kubectl --context foo cluster-info'

  - allow: 'kubectl top node|pod|nodes|pods *'
    tests:
      - allow: 'kubectl top nodes'
      - allow: 'kubectl top pod -A'
      - allow: 'kubectl --context foo top nodes'

  # `auth reconcile` mutates RBAC, so it is excluded.
  - allow: 'kubectl auth can-i|whoami *'
    tests:
      - allow: 'kubectl auth can-i list pods'
      - allow: 'kubectl auth whoami'
      - allow: 'kubectl --context foo auth whoami'

  - allow: 'kubectl diff|wait *'
    tests:
      - allow: 'kubectl diff -f manifest.yaml'
      - allow: 'kubectl wait --for=condition=Ready pod/foo'

  # `kubectl apply` is mutating by default. Allow only when every `--dry-run`
  # occurrence is `server` or `client`; kubectl uses last-wins for repeated
  # flags, so a trailing `--dry-run=none` would otherwise slip past a pattern
  # that only matches the first value.
  - allow: 'kubectl apply <flag:kubectl-apply-dry-run> *'
    when: 'flag_groups["kubectl-apply-dry-run"].all(v, v == "server" || v == "client")'
    tests:
      - allow: 'kubectl apply --server-side --dry-run=server --force-conflicts --field-manager=argocd-controller -f -'
      - allow: 'kubectl apply -f manifest.yaml --dry-run=client'
      - allow: 'kubectl apply --dry-run=server -f manifest.yaml'
      - ask: 'kubectl apply -f manifest.yaml'
      - ask: 'kubectl apply --dry-run=none -f manifest.yaml'
      - ask: 'kubectl apply --dry-run=server -f manifest.yaml --dry-run=none'
      - ask: 'kubectl apply --dry-run=client --dry-run=none -f manifest.yaml'

  # `kubectl config` read-only subcommands that only emit names.
  - allow: 'kubectl config current-context|get-contexts|get-clusters|get-users *'
    tests:
      - allow: 'kubectl config current-context'
      - allow: 'kubectl config get-contexts'
      - allow: 'kubectl config get-contexts -o name'
      - allow: 'kubectl config get-clusters'
      - allow: 'kubectl config get-users'
      - allow: 'kubectl --kubeconfig ~/.kube/work config current-context'
      - allow: 'kubectl --context foo config current-context'
  # `kubectl config view` defaults to `--raw=false`, which redacts
  # client-certificate-data / token / password fields. `--raw` disables that
  # redaction, and `-o jsonpath=...` can extract `users[].user.token` directly,
  # so allow only the redacted form without custom output formatting.
  - allow: 'kubectl config view [--minify] [--flatten]'
    tests:
      - allow: 'kubectl config view'
      - allow: 'kubectl config view --minify'
      - allow: 'kubectl config view --flatten'
      - allow: 'kubectl config view --minify --flatten'
      - allow: 'kubectl --kubeconfig ~/.kube/work config view --minify'

  - allow: 'helm completion|diff|help|history|lint|list|pull|search|show|status|template|verify|version *'
    tests:
      - allow: 'helm version'
      - allow: 'helm version --short'
      - allow: 'helm search repo cnpg/cloudnative-pg --versions'
      - allow: 'helm template cnpg-cluster ./manifests/cnpg-cluster'
      - allow: 'helm template foo ./chart --set roles[0].password=dummy'
      - allow: 'helm lint ./chart'
      - allow: 'helm history myrelease'
      - allow: 'helm list -A'
      - allow: 'helm pull tailscale-operator --version 1.96.5 --repo https://pkgs.tailscale.com/helmcharts --untar'
      - allow: 'helm pull oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set-controller --version 0.14.1 --untar'
      # `install` / `upgrade` / `uninstall` / `rollback` mutate the cluster.
      - ask: 'helm install foo ./chart'
      - ask: 'helm upgrade foo ./chart'
      - ask: 'helm uninstall foo'
      - ask: 'helm rollback foo 1'
      # `test` runs test pods on the cluster.
      - ask: 'helm test myrelease'
      # `env` reveals KUBECONFIG path and other secrets-adjacent state.
      - ask: 'helm env'
  - allow: 'helm get hooks|metadata|notes *'
    tests:
      - allow: 'helm get notes myrelease'
      - allow: 'helm get hooks myrelease'
      - allow: 'helm get metadata myrelease'
  # `get values|manifest|all` exposes Secret resources and credentials embedded in values.
  - ask: 'helm get values|manifest|all *'
    tests:
      - ask: 'helm get values myrelease'
      - ask: 'helm get manifest myrelease'
      - ask: 'helm get all myrelease'
  - allow: 'helm repo add|index|list|update *'
    tests:
      - allow: 'helm repo add cnpg https://cloudnative-pg.github.io/charts'
      - allow: 'helm repo update cnpg'
      - allow: 'helm repo update'
      - allow: 'helm repo list'
      # `repo remove` is destructive; let it fall through to ask.
      - ask: 'helm repo remove cnpg'

  - allow: 'helmfile [-l|--selector *] [-f|--file *] [-e|--environment *] [-n|--namespace *] [--kube-context *] [--kubeconfig *] build|deps|diff|fetch|lint|list|print-env|repos|show-dag|status|template|version *'
    tests:
      - allow: 'helmfile template'
      - allow: 'helmfile diff'
      - allow: 'helmfile deps'
      - allow: 'helmfile lint'
      - allow: 'helmfile list'
      - allow: 'helmfile status'
      - allow: 'helmfile version'
      - allow: 'helmfile --selector name=alloy template'
      - allow: 'helmfile --selector name=github-exporter template --skip-deps'
      - allow: 'helmfile -f kubernetes/helmfile.yaml --selector name=alloy template'
      - allow: 'helmfile --selector name=alloy diff'
      - allow: 'helmfile --debug template'
      # `apply` / `sync` / `destroy` mutate the cluster.
      - ask: 'helmfile apply'
      - ask: 'helmfile --selector name=alloy apply'
      - ask: 'helmfile sync'
      - ask: 'helmfile destroy'
      # `init` installs helm plugins locally.
      - ask: 'helmfile init'
      # `test` runs test pods on the cluster (not read-only).
      - ask: 'helmfile test'
      # `write-values` writes values files to arbitrary paths.
      - ask: 'helmfile write-values'

  # `-i/--insecure` makes talosctl talk to the maintenance API without auth,
  # so any subcommand using it must fall through to ask. This `ask` rule wins
  # over the allow rules below (Explicit Deny/Ask Wins).
  - ask: 'talosctl * -i|--insecure *'
    tests:
      - ask: 'talosctl -i get members'
      - ask: 'talosctl --insecure get members'
      - ask: 'talosctl get members --insecure'
      - ask: 'talosctl get members -i'

  # talosctl global flags that take a value: `-n|--nodes`, `-e|--endpoints`,
  # `-c|--cluster`, `--context`, `--talosconfig`, `--siderov1-keys-dir`. They
  # are listed as optional groups so the same rule matches both space- and
  # `=`-joined forms.
  - allow: 'talosctl get|list|ls|dmesg|events|containers|cgroups|processes|memory|mounts|netstat|stats|time|usage|version|health|inspect|dashboard|completion|disks|interfaces|routes *'
    tests:
      - allow: 'talosctl get members'
      - allow: 'talosctl --nodes 10.0.0.1 get members'
      - allow: 'talosctl --context foo get members'
      - allow: 'talosctl --talosconfig ~/.talos/config --context prod get nodes'
      - allow: 'talosctl -n 10.0.0.1 dmesg'
      - allow: 'talosctl list /etc'
      - allow: 'talosctl ls /etc'
      - allow: 'talosctl version'
      - allow: 'talosctl health'
      - allow: 'talosctl containers -k'
      - allow: 'talosctl processes'
      - allow: 'talosctl disks'
      - allow: 'talosctl --nodes 10.0.0.1 disks'
      - allow: 'talosctl interfaces'
      - allow: 'talosctl routes'

  # `image list|k8s-bundle|talos-bundle` are read-only. `pull`, `remove`,
  # `cache-create`, `cache-serve`, `cache-cert-gen` mutate node or local state
  # and must fall through to ask.
  - allow: 'talosctl image|images list|k8s-bundle|talos-bundle *'
    tests:
      - allow: 'talosctl image list'
      - allow: 'talosctl images list'
      - allow: 'talosctl --nodes 10.0.0.1 image list'
      - allow: 'talosctl image k8s-bundle'
      - allow: 'talosctl image talos-bundle'
      - ask: 'talosctl image pull ghcr.io/foo:bar'
      - ask: 'talosctl image remove ghcr.io/foo:bar'
      - ask: 'talosctl image cache-create --image-layer-cache /tmp/cache'

  # `service` / `services` without arguments lists services. `service <id>
  # status` is the explicit read action. `service <id>` (action omitted) and
  # `service <id> start|stop|restart` mutate or risk mutating state, so they
  # must fall through to ask. Negation `!start|stop|restart` constrains the
  # ID position to a single token that is not a state-changing action.
  - allow: 'talosctl service|services'
    tests:
      - allow: 'talosctl services'
      - allow: 'talosctl service'
  - allow: 'talosctl service|services !start|stop|restart status'
    tests:
      - allow: 'talosctl service kubelet status'
      - allow: 'talosctl --nodes 10.0.0.1 service kubelet status'
      - ask: 'talosctl service kubelet restart'
      - ask: 'talosctl service kubelet start'
      - ask: 'talosctl service kubelet stop'
      - ask: 'talosctl service kubelet stop status'
      - ask: 'talosctl service kubelet'

  # `talosctl config` read-only subcommands. `add`, `new`, `merge`, `endpoint`,
  # `node`, `context`, `remove` mutate the local talosconfig, so they are
  # excluded.
  - allow: 'talosctl config contexts|info'
    tests:
      - allow: 'talosctl config contexts'
      - allow: 'talosctl config info'
      - allow: 'talosctl --talosconfig ~/.talos/config config contexts'
      - ask: 'talosctl config context foo'
      - ask: 'talosctl config new'
      - ask: 'talosctl config add foo'
      - ask: 'talosctl config merge ./other'
      - ask: 'talosctl config endpoint 10.0.0.1'
      - ask: 'talosctl config node 10.0.0.1'
      - ask: 'talosctl config remove foo'

  # `etcd status` / `etcd members` are read-only. `etcd snapshot` is excluded
  # because it dumps the full etcd state (including all Kubernetes Secrets).
  - allow: 'talosctl etcd status|members'
    tests:
      - allow: 'talosctl etcd status'
      - allow: 'talosctl etcd members'
      - allow: 'talosctl --nodes 10.0.0.1 etcd status'
      - ask: 'talosctl etcd snapshot /tmp/snap.db'
      - ask: 'talosctl etcd defrag'
      - ask: 'talosctl etcd leave'
      - ask: 'talosctl etcd remove-member node-1'

  # `read` exposes arbitrary node files. Limit allowed targets to
  # `definitions.vars.talos-readable` so credential paths (`/etc/kubernetes`,
  # `/system/secrets`, `/var/lib/kubelet`) keep falling through to ask.
  - allow: 'talosctl read <var:talos-readable>'
    tests:
      - allow: 'talosctl read /proc/uptime'
      - allow: 'talosctl --nodes 10.0.0.1 read /proc/1/cmdline'
      - ask: 'talosctl read /etc/kubernetes/pki/ca.key'
      - ask: 'talosctl read /system/secrets/encryption-config.yaml'
      - ask: 'talosctl read /var/lib/kubelet/pki/kubelet.key'

  # `logs` reads Talos service or Kubernetes container logs. Default
  # klog/zap output does not include bearer tokens or Secret values, so
  # treat them as readable like `kubectl logs`.
  - allow: 'talosctl logs *'
    tests:
      - allow: 'talosctl logs kubelet'
      - allow: 'talosctl logs -k kube-apiserver'
      - allow: 'talosctl --nodes 10.0.0.1 logs k8s.io/kube-system/kube-apiserver-xxx'

  # The following reads are credential-adjacent and intentionally fall through
  # to ask:
  #   - `kubeconfig`: downloads cluster-admin credentials.
  #   - `copy`: pulls arbitrary data out of the node.
  #   - `pcap` / `tcpdump`: packet capture can expose plaintext creds.
  #   - `support`: debug bundle aggregates logs and resources.
