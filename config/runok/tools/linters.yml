# yaml-language-server: $schema=https://raw.githubusercontent.com/fohte/runok/main/schema/runok.schema.json

rules:
  - allow: 'actionlint *'
  - allow: 'bash -n *'
    tests:
      - allow: 'bash -n script.sh'
  - allow: 'shellcheck *'
    tests:
      - allow: 'shellcheck script.sh'
  - allow: 'shfmt *'
  - allow: 'prettier *'
  - allow: 'similarity-rs|similarity-ts|similarity-py *'
    tests:
      - allow: 'similarity-rs src/'
      - allow: 'similarity-ts src/ --threshold 0.8'
      - allow: 'similarity-py path/to/mod.py'
  - allow: 'tflint *'
  - allow: 'xmllint *'
