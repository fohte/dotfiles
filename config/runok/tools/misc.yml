# yaml-language-server: $schema=https://raw.githubusercontent.com/fohte/runok/main/schema/runok.schema.json

definitions:
  wrappers:
    # Treat `nlx --package <pkg> -c '<shell-string>'` as a wrapper so the
    # shell string inside the quotes is recursively evaluated against the
    # normal rules. Without this, the quoted token is opaque and a single
    # glob in the allow pattern would swallow arbitrary shell metacharacters
    # (e.g. `;`, `&&`), turning the rule into an RCE.
    - 'nlx --package * -c <cmd>'

rules:
  # armyknife
  - allow: 'a ai draft *'
  - allow: 'a ai pr-draft *'
  - allow: 'a ai review wait *'
  - allow: 'a gh check-pr-review *'
  - allow: 'a gh pr-review check *'
  - allow: 'a gh pr-review reply pull *'
  - allow: 'a gh pr-review reply push *'
  - allow: 'a gh pr-review reply review *'
  - allow: 'a gh issue-agent init|diff|pull|view|review *'
  - allow: 'a gh issue-agent push !--force !--allow-delete *'
    tests:
      - allow: a gh issue-agent push 123
      - ask: a gh issue-agent push --force 123
      - ask: a gh issue-agent push --allow-delete 123

  # Claude Code
  - allow: 'claude-session-digest *'
  - allow: 'gen-claude-template *'

  # semgrep
  - allow: 'sg|ast-grep scan *'
  - allow: 'sg|ast-grep test *'

  # workflow tools
  - allow: 'lefthook run *'
    tests:
      - allow: 'lefthook run pre-commit'
  - allow: 'mise run test *'

  # tmux (read-only)
  - allow: 'tmux capture-pane *'
  - allow: 'tmux display-message *'
  - allow: 'tmux list-*|show-* *'
    tests:
      - allow: 'tmux list-sessions'
      - allow: 'tmux show-options'

  # runok
  - allow: 'runok check *'
  - allow: 'runok exec *'

  - allow: nlx @marp-team/marp-cli@latest *

  - allow: pinact run *

  - allow: mise ls|where|which *
  - allow: mise config get *

  - allow: conftest verify *
  - allow: conftest test *

  # Renovate (debug-renovate skill).
  # `nlx --package renovate -c '<cmd>'` is routed through the
  # `nlx --package * -c <cmd>` wrapper above, so the shell string inside the
  # quotes is recursively evaluated as a normal command.
  - allow: 'renovate-dryrun *'
    tests:
      - allow: 'renovate-dryrun'
      - allow: 'renovate-dryrun --branch feature/x'
      - allow: 'renovate-dryrun --raw'
  - allow: 'renovate-config-validator *'
    tests:
      - allow: 'renovate-config-validator renovate.json5'
      - allow: "nlx --package renovate -c 'renovate-config-validator renovate.json5'"
      # Wrapper expands the quoted shell string, so command injection in `-c`
      # falls through to the `rm -rf *` deny rule in common.yml.
      - deny: "nlx --package renovate -c 'rm -rf /'"
      - deny: "nlx --package renovate -c 'renovate-config-validator renovate.json5; rm -rf /'"
