# yaml-language-server: $schema=https://raw.githubusercontent.com/fohte/runok/main/schema/runok.schema.json

# srt (@anthropic-ai/sandbox-runtime) runs the inner command in a sandbox
# with network/fs restrictions. Treated as a wrapper so the inner command
# (e.g. `cargo test ...`) is evaluated against the normal rules.

definitions:
  wrappers:
    # `srt [options] [-c] <command...>`. With `-c`, the inner command is a
    # shell string (like `sh -c`); without it, tokens are evaluated directly.
    - 'srt [-d|--debug] [-s|--settings *] [-c] <cmd>'

tests:
  extends:
    - '../runok.yml'
  cases:
    - allow: 'srt cargo test'
    - allow: 'srt --settings ./srt-settings.json cargo test'
    - allow: 'srt -s ./srt-settings.json cargo test --lib'
    - allow: 'srt -d cargo test'
    - allow: 'srt -d --settings ./srt-settings.json cargo test --lib -- --test-threads=1'
    - allow: 'srt --settings ./srt-settings.json -d cargo test'
    - allow: 'srt -c "echo hi"'
    - allow: 'srt --settings ./srt-settings.json -c "echo hi"'
    - allow: 'srt -d -c "echo hi"'

    # Destructive inner commands must still be denied via the inner rule.
    - deny: 'srt rm -rf /'
    - deny: 'srt --settings ./srt-settings.json rm -rf /'
    - deny: 'srt -d rm -rf /'
    - deny: 'srt -c "rm -rf /"'
    - deny: 'srt --settings ./srt-settings.json -c "rm -rf /"'
