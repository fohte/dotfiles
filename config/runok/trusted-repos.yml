# yaml-language-server: $schema=https://raw.githubusercontent.com/fohte/runok/main/schema/runok.schema.json

# Rules that allow arbitrary code execution only inside the user's own repos,
# where that risk is acceptable.
definitions:
  paths:
    trusted-repos:
      - '~/ghq/github.com/fohte'

rules:
  # `cargo run` can execute arbitrary host code via build.rs / proc-macros /
  # --manifest-path / --example, so this broad allow is gated by cwd.
  - allow: 'cargo run *'
    when: &trusted_repo_cwd "paths['trusted-repos'].exists(p, env.PWD == p || env.PWD.startsWith(p + '/'))"
    tests:
      - allow: 'cargo run'
      - allow: 'cargo run --quiet -- --dump-openapi'
      - allow: 'cargo run -q -- --dump-openapi'
      - allow: 'cargo run -- generate trigger'
      - allow: 'cargo run -- up'
      - allow: 'cargo run --bin backend --quiet -- --dump-openapi'
      - allow: 'cargo run --manifest-path backend/Cargo.toml -p backend -- --migrate-only'

  # `go run` / `go generate` execute arbitrary code (main package source,
  # `//go:generate` directives, or `go run <remote>@version`). The `when`
  # gates only the cwd, not the arguments — `go run example.com/x@latest`
  # from inside fohte/* still runs remote code. The cwd check just narrows
  # the blast radius to repos the user is actively working in.
  - allow: 'go run *'
    when: *trusted_repo_cwd
    tests:
      - allow: 'go run main.go'
      - allow: 'go run ./cmd/foo'
  - allow: 'go generate *'
    when: *trusted_repo_cwd
    tests:
      - allow: 'go generate ./cmd/di/...'
      - allow: 'go generate ./...'

  # `nr <script>` runs whatever the repo's own package.json "scripts" entry
  # defines — code the repo owns, same trust boundary as cargo run/go run above.
  # `-C <dir>` changes cwd before running, which would let the trusted-repos
  # check above pass while actually executing a script from an untrusted
  # directory, so its value must stay a relative path with no `..` traversal
  # (unlike -C's sibling --filter, which only selects among the current
  # repo's own workspace packages and can't escape it).
  - allow: 'nr [-C *] *'
    when: "paths['trusted-repos'].exists(p, env.PWD == p || env.PWD.startsWith(p + '/')) && (!has(flags.C) || (!flags.C.startsWith('/') && !flags.C.contains('..')))"
    tests:
      - allow: 'nr dev'
      - allow: 'nr preview --port 4173'
      - allow: 'nr --filter web run test'
      - allow: 'nr -C web dev'
      - ask: 'nr -C /tmp/untrusted-clone dev'
      - ask: 'nr -C ../../untrusted-clone dev'

  # `mise install` (bare) only installs what the repo's own mise.toml /
  # .tool-versions already declares, same trust boundary as cargo run/go run
  # above (it can run a tool's postinstall hook, but only one the repo itself
  # committed). A flagless literal — a flag on the command falls through to
  # the global default `ask` rather than being silently allowed.
  - allow: 'mise install'
    when: *trusted_repo_cwd
    tests:
      - allow: 'mise install'

  # `mise install <tool>@<version>` takes the package identifier straight
  # from the CLI argument instead of the repo's committed mise.toml, so it
  # isn't bounded by the trust boundary the bare allow above relies on (see
  # its comment). See `message` below for the recommended alternative.
  - deny: 'mise install *'
    when: 'size(args) > 1'
    message: 'Installing an explicit tool bypasses the mise.toml trust boundary. For persistent use, add it to config with `mise use -p <config-file> <tool>@<version>` (git-diffable), then bare `mise install` will pick it up. For one-off use, run `mise exec <tool>@<version> -- <cmd>` instead.'
    fix_suggestion: 'mise use -p mise.toml <tool>@<version>'
    tests:
      - deny: 'mise install node@20'
      - deny: 'mise install npm:opensrc@0.7.2'
      - allow: 'mise install'

  # `mise trust` marks the nearest mise.toml as trusted in mise's own trust
  # store, keyed by file path. Unlike cargo run/go run/bare mise install
  # above, this trust persists across future mise invocations — including
  # ones outside runok's reach, e.g. `mise activate`'s shell hook — without
  # being re-checked here each time, and propagates to any git worktree of
  # this repo regardless of that worktree's own path (`mise trust --help`:
  # "Trust is shared across git worktrees"). The `when` below only gates
  # where the trust decision gets made, not how long it lasts or where it
  # later applies. Also a flagless literal, same reasoning as bare
  # `mise install` above.
  - allow: 'mise trust'
    when: *trusted_repo_cwd
    tests:
      - allow: 'mise trust'

  # `mise run <task>` executes a task defined in the repo's own mise.toml /
  # .mise/tasks, same trust boundary as cargo run/go run/nr above. `-C`/`--cd`
  # changes the task-lookup directory and `-t`/`--tool` installs a tool not
  # declared in mise.toml, both bypassing the cwd check below the same way
  # nr's `-C` and the `mise install <tool>@<version>` deny above call out.
  - allow: 'mise run *'
    when: "paths['trusted-repos'].exists(p, env.PWD == p || env.PWD.startsWith(p + '/')) && !has(flags.C) && !has(flags.cd) && !has(flags.t) && !has(flags.tool)"
    tests:
      - allow: 'mise run test'
      - allow: 'mise run db:up'
      - allow: 'mise run db-up'
      - ask: 'mise run test -C /tmp/untrusted-clone'
      - ask: 'mise run test --cd /tmp/untrusted-clone'
      - ask: 'mise run test --tool npm:evil-package@1.0.0'
      - ask: 'mise run test -t npm:evil-package@1.0.0'

  # `docker exec`/`compose exec` attach to a container that's already
  # running, so most flags that widen host reach (--cap-add, --userns, ...)
  # don't apply -- only `--privileged` does (docker/compose both support
  # re-privileging an already-running container via exec).
  # Not scoped to a container-name pattern: compose project names change per
  # worktree, so a name glob would need constant upkeep.
  - allow: 'docker exec *'
    when: "paths['trusted-repos'].exists(p, env.PWD == p || env.PWD.startsWith(p + '/')) && !has(flags.privileged)"
    tests:
      - allow: 'docker exec app-1 psql -U app'
      - allow: 'docker exec -it app-1 sh'
      - ask: 'docker exec --privileged app-1 sh'
  - allow: 'docker-compose [-f *] [-p *] exec *'
    when: "paths['trusted-repos'].exists(p, env.PWD == p || env.PWD.startsWith(p + '/')) && !has(flags.privileged)"
    tests:
      - allow: 'docker compose exec db psql -U app'
      - allow: 'docker-compose exec web sh'
      - allow: 'docker compose -p tq-infra exec -T db psql -U tq -d tq_test -c "\d tasks"'
      - allow: 'docker --context colima compose exec db psql -U ddr_score_manager -d ddr_score_manager_test -c "\l"'
      - ask: 'docker compose exec --privileged web sh'

  # `docker compose run`/`docker run` both start a new container, so the
  # same flags that widen host reach apply to both -- see the `docker run`
  # comment below for what this guards and what it deliberately doesn't.
  - allow: 'docker-compose [-f *] run *'
    when: &docker_run_cwd_and_flags "paths['trusted-repos'].exists(p, env.PWD == p || env.PWD.startsWith(p + '/')) && !has(flags.privileged) && !('cap-add' in flags) && !has(flags.userns) && !has(flags.pid) && !has(flags.network) && !has(flags.ipc) && !has(flags.uts) && !('security-opt' in flags) && !('device' in flags)"
    tests:
      - allow: 'docker compose run --rm app pnpm test'
      - allow: 'docker-compose run web sh'
      - ask: 'docker compose run --cap-add=SYS_ADMIN app sh'

  # `docker run`/`docker create` both start an arbitrary image/command (create
  # just skips the auto-start -- a later `docker start`, already
  # unconditionally allowed in tools/docker.yml, is needed to actually run
  # it), so they share the exact same flag surface and trust boundary. Unlike
  # the rules above, a container started this way isn't limited to what a
  # project's own compose file already declares, so flags that widen the
  # container's reach into the host (root inside a privileged container,
  # added capabilities, host/other-namespace sharing, relaxed
  # seccomp/apparmor, raw device access) must still fall through to `ask`
  # rather than being silently allowed.
  #
  # This is a flag deny-list, not a value inspector: it can't catch
  # `-v /var/run/docker.sock:/var/run/docker.sock`, which hands the
  # container the colima VM's own docker socket (root-equivalent control of
  # every container on the VM) without tripping any flag above. Left
  # unguarded because the trust boundary this file grants is cwd-scoped
  # arbitrary host code execution already (see cargo run/nr above); a
  # container that fully controls the colima VM doesn't reach further than
  # a trusted-repo shell already does, and the VM's own mount (see
  # config/colima/colima.yaml) still confines it to a read-only ~/ghq.
  - allow: 'docker run|create *'
    when: *docker_run_cwd_and_flags
    tests:
      - allow: 'docker run --rm alpine echo hi'
      - allow: 'docker run -it --rm -v .:/app node:24 bash'
      - allow: 'docker create hashicorp/terraform:1.15 sleep 600'
      - allow: 'docker create --entrypoint /bin/sh hashicorp/terraform:1.15 -c "sleep 600"'
      - ask: 'docker run --privileged --rm alpine sh'
      - ask: 'docker run --cap-add=SYS_ADMIN --rm alpine sh'
      - ask: 'docker run --userns=host --rm alpine sh'
      - ask: 'docker run --pid=host --rm alpine sh'
      - ask: 'docker run --network=host --rm alpine sh'
      - ask: 'docker run --ipc=host --rm alpine sh'
      - ask: 'docker run --uts=host --rm alpine sh'
      - ask: 'docker run --security-opt=seccomp=unconfined --rm alpine sh'
      - ask: 'docker run --device=/dev/kvm --rm alpine sh'
      - ask: 'docker create --privileged alpine sh'
      - ask: 'docker create --cap-add=SYS_ADMIN alpine sh'
      # The unscoped allow above relies on the colima VM's own confinement
      # (see comment above). `docker` alias only recognizes `--context
      # colima` (tools/docker.yml), so a context pointing at a remote daemon
      # doesn't match the alias at all and falls through to ask instead of
      # escaping that confinement.
      - ask: 'docker --context evil-remote run --rm -v /:/host alpine sh'
