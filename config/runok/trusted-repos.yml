# yaml-language-server: $schema=https://raw.githubusercontent.com/fohte/runok/main/schema/runok.schema.json

# Rules that allow arbitrary code execution only inside the user's own repos,
# where that risk is acceptable.
definitions:
  paths:
    trusted-repos:
      - '~/ghq/github.com/fohte'

rules:
  # `cargo run` can execute arbitrary host code via build.rs / proc-macros /
  # --manifest-path / --example, so this broad allow is gated by cwd.
  - allow: 'cargo run *'
    when: &trusted_repo_cwd "paths['trusted-repos'].exists(p, env.PWD == p || env.PWD.startsWith(p + '/'))"
    tests:
      - allow: 'cargo run'
      - allow: 'cargo run --quiet -- --dump-openapi'
      - allow: 'cargo run -q -- --dump-openapi'
      - allow: 'cargo run -- generate trigger'
      - allow: 'cargo run -- up'
      - allow: 'cargo run --bin backend --quiet -- --dump-openapi'
      - allow: 'cargo run --manifest-path backend/Cargo.toml -p backend -- --migrate-only'

  # `go run` / `go generate` execute arbitrary code (main package source,
  # `//go:generate` directives, or `go run <remote>@version`). The `when`
  # gates only the cwd, not the arguments — `go run example.com/x@latest`
  # from inside fohte/* still runs remote code. The cwd check just narrows
  # the blast radius to repos the user is actively working in.
  - allow: 'go run *'
    when: *trusted_repo_cwd
    tests:
      - allow: 'go run main.go'
      - allow: 'go run ./cmd/foo'
  - allow: 'go generate *'
    when: *trusted_repo_cwd
    tests:
      - allow: 'go generate ./cmd/di/...'
      - allow: 'go generate ./...'

  # `nr <script>` runs whatever the repo's own package.json "scripts" entry
  # defines — code the repo owns, same trust boundary as cargo run/go run above.
  # `-C <dir>` changes cwd before running, which would let the trusted-repos
  # check above pass while actually executing a script from an untrusted
  # directory, so its value must stay a relative path with no `..` traversal
  # (unlike -C's sibling --filter, which only selects among the current
  # repo's own workspace packages and can't escape it).
  - allow: 'nr [-C *] *'
    when: "paths['trusted-repos'].exists(p, env.PWD == p || env.PWD.startsWith(p + '/')) && (!has(flags.C) || (!flags.C.startsWith('/') && !flags.C.contains('..')))"
    tests:
      - allow: 'nr dev'
      - allow: 'nr preview --port 4173'
      - allow: 'nr --filter web run test'
      - allow: 'nr -C web dev'
      - ask: 'nr -C /tmp/untrusted-clone dev'
      - ask: 'nr -C ../../untrusted-clone dev'

  # `mise install` (bare) only installs what the repo's own mise.toml /
  # .tool-versions already declares, same trust boundary as cargo run/go run
  # above (it can run a tool's postinstall hook, but only one the repo itself
  # committed). A flagless literal — a flag on the command falls through to
  # the global default `ask` rather than being silently allowed.
  - allow: 'mise install'
    when: *trusted_repo_cwd
    tests:
      - allow: 'mise install'

  # `mise install <tool>@<version>` takes the package identifier straight
  # from the CLI argument instead of the repo's committed mise.toml, so it
  # isn't bounded by the trust boundary the bare allow above relies on (see
  # its comment). See `message` below for the recommended alternative.
  - deny: 'mise install *'
    when: 'size(args) > 1'
    message: 'Installing an explicit tool bypasses the mise.toml trust boundary. For persistent use, add it to config with `mise use -p <config-file> <tool>@<version>` (git-diffable), then bare `mise install` will pick it up. For one-off use, run `mise exec <tool>@<version> -- <cmd>` instead.'
    fix_suggestion: 'mise use -p mise.toml <tool>@<version>'
    tests:
      - deny: 'mise install node@20'
      - deny: 'mise install npm:opensrc@0.7.2'
      - allow: 'mise install'

  # `mise trust` marks the nearest mise.toml as trusted in mise's own trust
  # store, keyed by file path. Unlike cargo run/go run/bare mise install
  # above, this trust persists across future mise invocations — including
  # ones outside runok's reach, e.g. `mise activate`'s shell hook — without
  # being re-checked here each time, and propagates to any git worktree of
  # this repo regardless of that worktree's own path (`mise trust --help`:
  # "Trust is shared across git worktrees"). The `when` below only gates
  # where the trust decision gets made, not how long it lasts or where it
  # later applies. Also a flagless literal, same reasoning as bare
  # `mise install` above.
  - allow: 'mise trust'
    when: *trusted_repo_cwd
    tests:
      - allow: 'mise trust'

  # `mise run <task>` executes a task defined in the repo's own mise.toml /
  # .mise/tasks, same trust boundary as cargo run/go run/nr above. `-C`/`--cd`
  # changes the task-lookup directory and `-t`/`--tool` installs a tool not
  # declared in mise.toml, both bypassing the cwd check below the same way
  # nr's `-C` and the `mise install <tool>@<version>` deny above call out.
  - allow: 'mise run *'
    when: "paths['trusted-repos'].exists(p, env.PWD == p || env.PWD.startsWith(p + '/')) && !has(flags.C) && !has(flags.cd) && !has(flags.t) && !has(flags.tool)"
    tests:
      - allow: 'mise run test'
      - allow: 'mise run db:up'
      - allow: 'mise run db-up'
      - ask: 'mise run test -C /tmp/untrusted-clone'
      - ask: 'mise run test --cd /tmp/untrusted-clone'
      - ask: 'mise run test --tool npm:evil-package@1.0.0'
      - ask: 'mise run test -t npm:evil-package@1.0.0'
