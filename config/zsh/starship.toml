format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
${custom.aws_sso_valid}\
${custom.aws_sso_expired}\
${custom.cc_paused}\
${env_var.STARSHIP_PROMPT_EXTRA}\
$time\
$cmd_duration\
$line_break\
$character"""

[time]
disabled = false
time_format = "%H:%M:%S"
format = '[$time]($style) '
style = "bright-black"

[directory]
style = "blue"
truncate_to_repo = false
truncation_length = 0

[character]
success_symbol = "[❯](purple)"
error_symbol = "[❯](red)"
vimcmd_symbol = "[❯](green)"

[git_branch]
format = "[$branch]($style)"
style = "bright-black"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](218) ($ahead_behind$stashed)]($style) "
style = "cyan"
conflicted = "​"
untracked = "​"
modified = "​"
staged = "​"
renamed = "​"
deleted = "​"
stashed = "≡"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"

[custom.aws_sso_valid]
command = "check-aws-sso-status && echo '󰅠'" # nf-md-cloud_check
when = "command -v check-aws-sso-status"
shell = "bash"
format = "[$output]($style) "
style = "bright-green"

[custom.aws_sso_expired]
command = "check-aws-sso-status; [ $? -eq 1 ] && echo '󰧠'" # nf-md-cloud_alert
when = "command -v check-aws-sso-status"
shell = "bash"
format = "[$output]($style) "
style = "bright-red"

# Shows '⏸' when armyknife auto-paused the Claude Code session in this pane.
# The flag is materialized as `<TMPDIR>/armyknife-cc-paused-<user>-<pane>` by
# `a cc hook`; file stat avoids the ~40ms tmux client fork per prompt.
[custom.cc_paused]
command = 'echo ⏸'
when = '[ -n "$TMUX" ] && [ -e "${TMPDIR:-/tmp}/armyknife-cc-paused-$USER-$TMUX_PANE" ]'
shell = "bash"
format = "[$output]($style) "
style = "yellow"

[env_var.STARSHIP_PROMPT_EXTRA]
variable = "STARSHIP_PROMPT_EXTRA"
format = "[$env_value]($style) "
style = "bright-purple"
default = ""
